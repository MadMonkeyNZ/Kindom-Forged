let _THREE = null, _CANNON = null, _libsLoaded = false;
async function _loadLibs() {
  if (_libsLoaded) return;
  [_THREE, _CANNON] = await Promise.all([
    import('https://unpkg.com/three@0.160.0/build/three.module.js'),
    import('https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js')
  ]);
  _libsLoaded = true;
}

// Persistent scene — survives render() calls, only torn down on new roll
let _ds = null;

// Hard teardown — destroys renderer and removes from DOM
function teardownPhysics() {
  if (!_ds) return;
  if (_ds.rafId) { cancelAnimationFrame(_ds.rafId); _ds.rafId = null; }
  if (_ds.renderer) {
    _ds.renderer.dispose();
    const c = _ds.renderer.domElement;
    if (c && c.parentNode) c.parentNode.removeChild(c);
  }
  if (_ds.overlay && _ds.overlay.parentNode)
    _ds.overlay.parentNode.removeChild(_ds.overlay);
  _ds = null;
}

// ── Face texture builder ─────────────────────────────────────────────────────
function _makeFaceTex(T, face, isWinter) {
  const cv = document.createElement('canvas');
  cv.width = 256; cv.height = 256;
  const ctx = cv.getContext('2d');

  // Pick background + border + label colour by face type
  let bgA, bgB, border, labelCol;
  if (isWinter) {
    bgA='#0d2440'; bgB='#162e54'; border='#4a90d0'; labelCol='#90c8ff';
  } else if (face.legendary) {
    const gc = face.legendaryGlow || '#f5c842';
    bgA='#1a1200'; bgB='#2e2000'; border=gc; labelCol=gc;
  } else if (face.neg) {
    // All curse/negative faces: deep red
    bgA='#2a0606'; bgB='#1a0404'; border='#cc2020'; labelCol='#ff7070';
  } else if (face.grain > 0 && face.gold === 0 && face.hammer === 0 && face.glory === 0) {
    // Pure grain: dark earthy brown
    bgA='#2e1a06'; bgB='#1e1004'; border='#a06020'; labelCol='#e09040';
  } else if (face.gold > 0 && face.grain === 0 && face.hammer === 0 && face.glory === 0) {
    // Pure gold: deep dark gold/amber
    bgA='#241a00'; bgB='#160e00'; border='#c8a000'; labelCol='#ffd040';
  } else if (face.hammer > 0 && face.grain === 0 && face.gold === 0 && face.glory === 0) {
    // Pure hammer: dark steel grey
    bgA='#161e28'; bgB='#0e141e'; border='#6080a0'; labelCol='#a0c0e0';
  } else if (face.glory > 0 && face.grain === 0 && face.gold === 0 && face.hammer === 0) {
    // Pure prestige: deep purple
    bgA='#1a0830'; bgB='#100420'; border='#8040c0'; labelCol='#c080ff';
  } else {
    // Mixed resource faces: dark teal
    bgA='#0a1e20'; bgB='#061418'; border='#4090a0'; labelCol='#70c8d8';
  }

  // Background gradient
  const g = ctx.createLinearGradient(0, 0, 256, 256);
  g.addColorStop(0, bgA); g.addColorStop(1, bgB);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 256, 256);

  // Subtle inner highlight at top
  const hi = ctx.createLinearGradient(0, 0, 0, 80);
  hi.addColorStop(0, 'rgba(255,255,255,0.10)'); hi.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hi; ctx.fillRect(0, 0, 256, 80);

  // Border
  ctx.strokeStyle = border; ctx.lineWidth = 14;
  ctx.beginPath(); ctx.roundRect(7, 7, 242, 242, 26); ctx.stroke();

  // Label top-left
  ctx.font = 'bold 22px sans-serif';
  ctx.fillStyle = labelCol;
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  const lbl = face.label.length > 12 ? face.label.slice(0, 11) + '…' : face.label;
  ctx.fillText(lbl, 16, 14);

  // Main emoji — white so it pops on any dark bg
  ctx.font = '110px serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(face.sym, 128, 152);

  const tex = new T.CanvasTexture(cv);
  tex.needsUpdate = true;
  return tex;
}

// ── Die mesh ─────────────────────────────────────────────────────────────────
// faceIds[0]=top(+Y), [1]=front(+Z), [2]=right(+X), [3]=bottom(-Y), [4]=back(-Z), [5]=left(-X)
// BoxGeometry material slots: +X=0, -X=1, +Y=2, -Y=3, +Z=4, -Z=5
const _DIE_UNIT = 2.2; // world-unit size of each die
function _buildDieMesh(T, faceIds, isWinter) {
  const mats = faceIds.map(fid =>
    new T.MeshStandardMaterial({ map: _makeFaceTex(T, F[fid], isWinter), roughness: 0.15, metalness: 0.06 })
  );
  // map our logical faces to BoxGeometry slots
  const slotted = [mats[2], mats[5], mats[0], mats[3], mats[1], mats[4]];
  const mesh = new T.Mesh(new T.BoxGeometry(_DIE_UNIT, _DIE_UNIT, _DIE_UNIT), slotted);
  mesh.castShadow = true; mesh.receiveShadow = true;
  mesh._faceIds = faceIds;
  return mesh;
}

// Which faceIds[] index is facing up (+Y world) given this quaternion?
function _getTopFace(T, quat) {
  const tests = [
    { idx: 2, v: new T.Vector3(1,0,0) }, { idx: 5, v: new T.Vector3(-1,0,0) },
    { idx: 0, v: new T.Vector3(0,1,0) }, { idx: 3, v: new T.Vector3(0,-1,0) },
    { idx: 1, v: new T.Vector3(0,0,1) }, { idx: 4, v: new T.Vector3(0,0,-1) },
  ];
  const up = new T.Vector3(0, 1, 0);
  let best = -Infinity, bestIdx = 0;
  tests.forEach(({ idx, v }) => {
    const dot = v.clone().applyQuaternion(quat).dot(up);
    if (dot > best) { best = dot; bestIdx = idx; }
  });
  return bestIdx;
}

// ── Build the scene (called once per roll) ───────────────────────────────────
function _buildScene(T, W, H) {
  const scene = new T.Scene();
  // Warm dark amber background — clearly not black
  scene.background = new T.Color(0x0d3320);

  const camera = new T.PerspectiveCamera(58, W / H, 0.1, 60);
  // Top-down view — looking straight down with a slight forward tilt
  camera.position.set(0, 12, 2);
  camera.lookAt(0, 0, 0);

  const renderer = new T.WebGLRenderer({ antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = T.PCFSoftShadowMap;

  // Bright warm ambient so table surface is clearly visible
  scene.add(new T.AmbientLight(0xffe8b0, 0.9));

  const key = new T.DirectionalLight(0xfff4d0, 1.4);
  key.position.set(5, 10, 6); key.castShadow = true;
  key.shadow.mapSize.set(1024, 1024);
  key.shadow.camera.near = 1; key.shadow.camera.far = 25;
  key.shadow.camera.left = -7; key.shadow.camera.right = 7;
  key.shadow.camera.top = 7; key.shadow.camera.bottom = -7;
  key.shadow.bias = -0.003;
  scene.add(key);
  const fill = new T.DirectionalLight(0xb0c8ff, 0.4);
  fill.position.set(-5, 4, -4);
  scene.add(fill);

  // Table surface — casino green felt
  const table = new T.Mesh(
    new T.PlaneGeometry(20, 20),
    new T.MeshStandardMaterial({ color: 0x1a6b3a, roughness: 0.93, metalness: 0 })
  );
  table.rotation.x = -Math.PI / 2;
  table.receiveShadow = true;
  scene.add(table);

  // Felt grain lines — darker green, clearly readable
  const lm = new T.LineBasicMaterial({ color: 0x0d4020, transparent: true, opacity: 0.65 });
  for (let i = -10; i <= 10; i += 1.0) {
    const pts = [new T.Vector3(-10, 0.01, i), new T.Vector3(10, 0.01, i)];
    scene.add(new T.Line(new T.BufferGeometry().setFromPoints(pts), lm));
  }
  for (let i = -10; i <= 10; i += 1.0) {
    const pts = [new T.Vector3(i, 0.01, -10), new T.Vector3(i, 0.01, 10)];
    scene.add(new T.Line(new T.BufferGeometry().setFromPoints(pts), lm));
  }

  return { scene, camera, renderer };
}

// ── Physics world ────────────────────────────────────────────────────────────
function _buildWorld(C) {
  const world = new C.World({ gravity: new C.Vec3(0, -30, 0) });

  // Bouncier walls than floor — dice rebound back into view
  const wallMat = new C.Material('wall');
  const floorMat = new C.Material('floor');
  const wallContact = new C.ContactMaterial(wallMat, floorMat, { restitution: 0.55, friction: 0.3 });
  const wallWall = new C.ContactMaterial(wallMat, wallMat, { restitution: 0.6, friction: 0.25 });
  const floorFloor = new C.ContactMaterial(floorMat, floorMat, { restitution: 0.18, friction: 0.7 });
  world.addContactMaterial(wallContact);
  world.addContactMaterial(wallWall);
  world.addContactMaterial(floorFloor);
  world.solver.iterations = 16;

  // Floor
  const floor = new C.Body({ type: C.Body.STATIC, shape: new C.Plane(), material: floorMat });
  floor.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
  world.addBody(floor);

  // Walls — camera is at y=12, z=2, looking at origin. Visible area at floor is roughly:
  //   x: ±3.2  z: -3.2 to +4.0
  // Place walls slightly inside that so dice can never escape, with plenty of height.
  // [x, y, z,  rx, ry, rz,  half-extents wx,wy,wz]
  const WALL_H = 6; // tall enough that a bouncing die can't fly over
  const wallDefs = [
    [0, WALL_H/2, -3.3, 0, 0, 0,        3.5, WALL_H, 0.22], // back
    [0, WALL_H/2,  4.1, 0, 0, 0,        3.5, WALL_H, 0.22], // front
    [-3.3, WALL_H/2, 0, 0, Math.PI/2, 0, 3.5, WALL_H, 0.22], // left
    [ 3.3, WALL_H/2, 0, 0, Math.PI/2, 0, 3.5, WALL_H, 0.22], // right
  ];
  wallDefs.forEach(([x,y,z, rx,ry,rz, wx,wy,wz]) => {
    const b = new C.Body({ type: C.Body.STATIC, shape: new C.Box(new C.Vec3(wx,wy,wz)), material: wallMat });
    b.position.set(x,y,z);
    b.quaternion.setFromEuler(rx,ry,rz);
    world.addBody(b);
  });

  return world;
}

// ── Burst labels overlay ─────────────────────────────────────────────────────
function _spawnBurst(overlay, sx, sy, face, W, H) {
  const labels = [];
  if (face.grain) labels.push({ t: `🌾${face.grain>0?'+':''}${face.grain}`, c: face.grain>0?'#5ab830':'#cc2020' });
  if (face.gold)  labels.push({ t: `💰${face.gold>0?'+':''}${face.gold}`,   c: face.gold>0?'#c89030':'#cc2020' });
  if (face.hammer) labels.push({ t: `⚒️+${face.hammer}`, c: '#4060c8' });
  if (face.glory)  labels.push({ t: `⚜️${face.glory>0?'+':''}${face.glory}`, c: '#8030c0' });
  if (face.neg && labels.length === 0) labels.push({ t: face.label, c: '#cc0000' });
  labels.forEach((l, j) => {
    const el = document.createElement('div');
    const ox = (j-(labels.length-1)/2)*38 + (Math.random()-0.5)*16;
    el.style.cssText = `position:absolute;left:${sx+ox}px;top:${sy}px;font:bold 14px sans-serif;color:${l.c};text-shadow:0 1px 5px rgba(0,0,0,.9);pointer-events:none;white-space:nowrap;`;
    el.textContent = l.t;
    overlay.appendChild(el);
    let vy=-55, life=1.0, lastT=null;
    const vxd=(Math.random()-0.5)*28;
    (function anim(t){
      if(!lastT)lastT=t; const dt=Math.min((t-lastT)/1000,0.05); lastT=t;
      life-=dt*0.95; vy+=110*dt;
      el.style.top=(parseFloat(el.style.top)+vy*dt)+'px';
      el.style.left=(parseFloat(el.style.left)+vxd*dt)+'px';
      el.style.opacity=Math.max(0,Math.min(1,life*2.2)).toFixed(2);
      if(life>0)requestAnimationFrame(anim); else el.remove();
    })(performance.now());
  });
}

// ── Main roll entry point ────────────────────────────────────────────────────
async function startDiceRoll(rolls) {
  // Always teardown old scene before starting a new roll
  teardownPhysics();
  await _loadLibs();
  const T = _THREE, C = _CANNON;

  // Get container AFTER DOM is updated
  const container = document.getElementById('diceViewport');
  if (!container) { console.error('diceViewport not found'); return; }

  // Measure actual rendered size — the CSS sets both width & height on the stage
  const W = container.offsetWidth  || 380;
  const H = container.offsetHeight || 380;
  container.style.position = 'relative';

  const { scene, camera, renderer } = _buildScene(T, W, H);
  container.appendChild(renderer.domElement);

  const world = _buildWorld(C);

  // HTML overlay for burst labels
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:2;';
  container.appendChild(overlay);

  // Build die objects
  // Separate normal and winter dice for independent positioning
  const normalRolls = rolls.filter(r => !r.isWinterDie);
  const diceObjs = rolls.map((roll, i) => {
    const isWinter = !!roll.isWinterDie;
    const faceIds = isWinter ? [...DIE_WINTER] : [...(G.dice[i] || DIE_WINTER)];
    const mesh = _buildDieMesh(T, faceIds, isWinter);
    scene.add(mesh);

    const body = new C.Body({
      mass: 1,
      shape: new C.Box(new C.Vec3(_DIE_UNIT/2, _DIE_UNIT/2, _DIE_UNIT/2)),
      linearDamping: 0.28,
      angularDamping: 0.35,
    });

    // Position: normal dice spread centrally; winter die placed separately at the back
    // All constrained well within ±3 to stay on screen
    let spawnX, spawnZ;
    if (isWinter) {
      spawnX = (Math.random() - 0.5) * 1.0;
      spawnZ = -1.0 + (Math.random() - 0.5) * 0.4;
    } else {
      const ni = normalRolls.indexOf(roll);
      const nc = normalRolls.length;
      const spread = Math.min(2.2, nc * 0.85); // max spread ±1.1, well inside ±3.3 walls
      spawnX = nc > 1 ? (ni/(nc-1) - 0.5) * spread + (Math.random()-0.5)*0.15 : (Math.random()-0.5)*0.6;
      spawnZ = 0.6 + (Math.random() - 0.5) * 0.6;
    }
    body.position.set(spawnX, 6 + i * 0.8 + Math.random()*0.3, spawnZ);

    const eq = new C.Quaternion();
    eq.setFromEuler(Math.random()*Math.PI*2, Math.random()*Math.PI*2, Math.random()*Math.PI*2);
    body.quaternion.copy(eq);

    // Moderate velocity — enough tumble without flying into walls
    body.velocity.set((Math.random()-0.5)*2.0, -0.5-Math.random()*0.8, (Math.random()-0.5)*2.0);
    body.angularVelocity.set((Math.random()-0.5)*14, (Math.random()-0.5)*14, (Math.random()-0.5)*14);

    world.addBody(body);
    return { mesh, body, roll, faceIds, isWinter, settled: false, frames: 0, burstDone: false };
  });

  // SETTLE thresholds — use a running low-water mark so a rocking die
  // that briefly dips below threshold still accumulates progress
  const SETTLE_V = 0.09, SETTLE_AV = 0.07, SETTLE_FRAMES = 35;
  // Hard timeout: after 3s force-settle any stuck dice and resolve the roll.
  // After 5s (shouldn't happen) do a full automatic re-roll.
  const FORCE_SETTLE_MS = 3000;
  const AUTO_REROLL_MS = 5000;
  const rollStart = performance.now();
  let allSettled = false, postTimer = 0, lastTs = null, rafId = null;
  let timeoutTriggered = false;

  _ds = { renderer, scene, camera, world, diceObjs, overlay, rafId: null };

  function toScreen(pos) {
    const v = new T.Vector3(pos.x, pos.y, pos.z).project(camera);
    return { x: (v.x*0.5+0.5)*W, y: (-v.y*0.5+0.5)*H };
  }

  function forceSettleAll() {
    // Slam all velocities to zero and mark settled — used by hard timeout
    diceObjs.forEach(obj => {
      if (!obj.settled) {
        obj.body.velocity.set(0, 0, 0);
        obj.body.angularVelocity.set(0, 0, 0);
        obj.body.type = C.Body.STATIC;
        obj.settled = true;
      }
    });
    allSettled = true;
  }

  function finishRoll() {
    diceObjs.forEach((obj, i) => {
      const q = new T.Quaternion(obj.body.quaternion.x, obj.body.quaternion.y, obj.body.quaternion.z, obj.body.quaternion.w);
      const topIdx = _getTopFace(T, q);
      if (!obj.isWinter) {
        G._pendingRolls[i].idx = topIdx;
        G._pendingRolls[i].face = F[obj.faceIds[topIdx]];
      } else {
        const wi = rolls.findIndex(r => r.isWinterDie);
        if (wi >= 0) { G._pendingRolls[wi].idx = topIdx; G._pendingRolls[wi].face = F[DIE_WINTER[topIdx]]; }
      }
    });
    _ds.rafId = null;
    _ds.world = null;
    G.rolling = false;
    applyRollResults(G._pendingRolls);
    G.lastRolls = G._pendingRolls;
    G.phase = G.ad.extraRoll ? 'ROLL' : 'ACTION';
    _renderUI();
  }

  function frame(ts) {
    if (!_ds || _ds.renderer !== renderer) return;

    if (!lastTs) lastTs = ts;
    const dt = Math.min((ts-lastTs)/1000, 0.05);
    lastTs = ts;
    const elapsed = ts - rollStart;

    // ── Hard timeout: 3s — force all dice flat and resolve ──
    if (!timeoutTriggered && elapsed > FORCE_SETTLE_MS) {
      timeoutTriggered = true;
      forceSettleAll();
      // Render one more frame so player can see final positions, then finish
      world.step(1/60, dt, 3);
      diceObjs.forEach(obj => { obj.mesh.position.copy(obj.body.position); obj.mesh.quaternion.copy(obj.body.quaternion); });
      renderer.render(scene, camera);
      finishRoll();
      return;
    }

    // ── Safety re-roll at 5s (should never trigger after the above) ──
    if (elapsed > AUTO_REROLL_MS) {
      G.rolling = true;
      teardownPhysics();
      requestAnimationFrame(() => startDiceRoll(G._pendingRolls));
      return;
    }

    world.step(1/60, dt, 3);

    let everythingSettled = true;
    diceObjs.forEach(obj => {
      obj.mesh.position.copy(obj.body.position);
      obj.mesh.quaternion.copy(obj.body.quaternion);

      if (!obj.settled) {
        const spd = obj.body.velocity.length();
        const asp = obj.body.angularVelocity.length();
        if (spd < SETTLE_V && asp < SETTLE_AV) {
          if (++obj.frames >= SETTLE_FRAMES) {
            obj.settled = true;
            obj.body.type = C.Body.STATIC;
          }
        } else {
          obj.frames = Math.max(0, obj.frames - 1); // decay rather than reset — helps rocking dice
        }
      }
      if (!obj.settled) everythingSettled = false;

      if (obj.settled && !obj.burstDone) {
        obj.burstDone = true;
        const sp = toScreen(obj.body.position);
        _spawnBurst(overlay, sp.x, sp.y-25, obj.roll.face, W, H);
      }
    });

    renderer.render(scene, camera);

    if (everythingSettled && !allSettled) allSettled = true;
    if (allSettled) postTimer += dt;

    if (allSettled && postTimer > 1.2) {
      finishRoll();
      return;
    }

    rafId = requestAnimationFrame(frame);
    _ds.rafId = rafId;
  }

  rafId = requestAnimationFrame(frame);
  _ds.rafId = rafId;
}

// ── Reattach 3D scene after HTML rebuild ─────────────────────────────────────
// Called after innerHTML rebuild to re-mount the persistent renderer canvas
function _reattachScene() {
  if (!_ds || !_ds.renderer) return;
  const vp = document.getElementById('diceViewport');
  if (!vp) return;
  vp.style.position = 'relative';
  // Re-add renderer canvas if not already there
  if (!vp.contains(_ds.renderer.domElement)) {
    vp.appendChild(_ds.renderer.domElement);
  }
  // Re-add overlay if not already there
  if (_ds.overlay && !vp.contains(_ds.overlay)) {
    vp.appendChild(_ds.overlay);
  }
  // Do one render to show current state
  if (_ds.scene && _ds.camera) {
    _ds.renderer.render(_ds.scene, _ds.camera);
  }
}

// ── render() — rebuilds UI HTML without destroying 3D scene ─────────────────
function render() {
  if (_ds && _ds.rafId) { cancelAnimationFrame(_ds.rafId); _ds.rafId = null; }
  document.getElementById('app').innerHTML = buildHTML();
  bindEvents();
  if (G?.rolling) {
    requestAnimationFrame(() => startDiceRoll(G._pendingRolls));
  } else if (_ds) {
    _reattachScene();
  } else if (G) {
    requestAnimationFrame(() => _showEmpty());
  }
}

function _renderUI() {
  if (_ds && _ds.rafId) { cancelAnimationFrame(_ds.rafId); _ds.rafId = null; }
  document.getElementById('app').innerHTML = buildHTML();
  bindEvents();
  _reattachScene();
}

function _syncLayout(){} // no-op — layout is fully CSS-driven

// ── Placeholder for first view ────────────────────────────────────────────────
function _showEmpty() {
  const vp = document.getElementById('diceViewport');
  if (!vp) return;
  const W = vp.offsetWidth||380, H = vp.offsetHeight||380;
  const cv = document.createElement('canvas');
  cv.style.cssText = 'width:100%;height:100%;display:block;';
  cv.width = W; cv.height = H;
  vp.appendChild(cv);
  const ctx = cv.getContext('2d');

  ctx.fillStyle = '#1a6b3a'; ctx.fillRect(0, 0, W, H);
  const vg = ctx.createRadialGradient(W/2,H/2,H*0.1,W/2,H/2,H*0.85);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.4)');
  ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(8,40,20,0.55)'; ctx.lineWidth=1;
  for(let y=0;y<H;y+=12){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  for(let x=0;x<W;x+=12){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}

  ctx.font = 'bold 13px Cinzel, serif'; ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(200,160,60,.5)';
  ctx.fillText('Click here or Roll the Dice to begin', W/2, H/2);
}



function buildHTML(){
  if(!G)return buildDiffScreen();
  return `
${buildTopBar()}
<div class="main-area">
  ${buildLeftPanel()}
  ${buildCentrePanel()}
  ${buildRightPanel()}
</div>
${buildActionBar()}
${G.phase==='CARD'?buildCardModal():''}
${G.modal==='forge'?buildForgeModal():''}
${G.modal==='forge_face'?buildFaceModal():''}
${G.modal==='deeds'?buildDeedsModal():''}
${G.modal==='removePerm'?buildRemovePermModal():''}
${G.modal==='faceswap'?buildFaceSwapModal():''}
${G.modal==='visitor'?buildVisitorModal():''}
${G.phase==='GAME_OVER'?buildGameOver():''}
${S.showSettings?buildSettingsPanel():''}`;
}

function buildTopBar(){
  const pips=Array.from({length:Math.min(G.season+3,20)},(_,i)=>{
    const s=i+1;
    const cls=s<G.season?'done':s===G.season?'active':'';
    return `<div class="s-pip ${cls}" title="Season ${s}: ${sName(s)}">${s<G.season?'✓':sIcon(s)}</div>`;
  }).join('');
  const phaseStr=G.phase==='CARD'?'Draw card':G.phase==='ROLL'?'Roll dice':G.phase==='ACTION'?'Take action':'';
  return `<div class="top-bar">
    <div class="top-bar-title">⚔️ Kingdom Dice Forge</div>
    <div class="top-bar-season">${sIcon(G.season)} ${sName(G.season)} · S${G.season}</div>
    <div class="top-bar-track">${pips}</div>
    <div class="top-bar-status">${phaseStr} · <strong>${G.diff.name}</strong></div>
    <button class="settings-btn" id="btnOpenSettings">⚙️ Settings</button>
  </div>`;
}

function buildLeftPanel(){
  const r=G.resources,prod=calcProd();
  const rank=getRank(G.glory),nxt=RANKS.find(t=>t.min>G.glory);
  const rpct=nxt?Math.min(100,((G.glory-rank.min)/(nxt.min-rank.min))*100):100;
  const t=G.diff.target,gap=t-G.glory;
  const pc=permCount(),dth=G.DEATH_THRESHOLD;
  const pcCls=pc>=6?'danger':pc>=3?'warn':'';

  return `<div class="left-panel">
    <div class="lp-section">
      <div class="lp-title">Resources</div>
      <div class="res-row"><span class="res-icon">🌾</span><span class="res-val">${r.grain||0}</span><span class="res-label">Grain</span>${prod.grain>0?`<span class="res-prod">+${prod.grain}/s</span>`:''}</div>
      <div class="res-row"><span class="res-icon">💰</span><span class="res-val">${r.gold||0}</span><span class="res-label">Gold</span>${prod.gold>0?`<span class="res-prod">+${prod.gold}/s</span>`:''}</div>
      <div class="res-row"><span class="res-icon">⚒️</span><span class="res-val">${r.hammer||0}</span><span class="res-label">Hammers</span>${prod.hammer>0?`<span class="res-prod">+${prod.hammer}/s</span>`:''}</div>
    </div>
    <div class="lp-section">
      <div class="lp-title">Prestige</div>
      <div class="glory-num">⚜️ ${G.glory}</div>
      <div class="glory-label">PRESTIGE</div>
      <div class="rank-name">${rank.t}</div>
      ${nxt?`<div class="rank-next">${nxt.min-G.glory} until ${nxt.t}</div>`:'<div class="rank-next">Max Rank!</div>'}
      <div class="prog-track"><div class="prog-fill" style="width:${rpct}%"></div></div>
      <div class="target-row">
        <span class="target-lbl">Target ${G.diff.name}</span>
        <span class="target-val">${gap>0?gap+' to go':'✓ Done!'} / ⚜️${t}</span>
      </div>
      ${pc>0?`<div class="curse-chip ${pcCls}">☠️ ${pc}/${dth} permanent curses</div>`:''}
    </div>
    <div class="lp-section" style="flex:1;overflow-y:auto;">
      <div class="lp-title">Quick Ref</div>
      <div style="font-size:.65em;color:var(--text-faint);line-height:1.7;">
        <div>🌾 Grain — decrees &amp; trade</div>
        <div>💰 Gold — buildings &amp; specials</div>
        <div>⚒️ Hammers — spent at Forge</div>
        <div>⚜️ Prestige — your score</div>
        <div style="margin-top:5px;color:var(--red)">☀️🗡️💀🔥🧿🌊 Curse faces</div>
        <div style="color:var(--red)">⚒️ Hammer to forge away</div>
        <div style="margin-top:5px;color:var(--perm-red)">⛔ Perm curse — needs Shrine</div>
        <div style="color:var(--perm-red)">💀 All-cursed die = defeat</div>
        <div style="margin-top:5px;color:#5090d0">❄️ Winter Die — mostly bad</div>
        <div style="color:#ffa040">⚖️ Loaded die — forged to break</div>
        <div style="color:var(--text-faint)">🫥 Frozen — end season only</div>
      </div>
    </div>
  </div>`;
}

function buildCentrePanel(){
  const rolling=G.rolling;
  const canRoll=G.phase==='ROLL'&&!rolling&&!G.ad.diceFrozen;
  const winter=isWinter(G.season);
  const stageLabel=G.ad.diceFrozen?'🫥 Dice Frozen'
    :rolling?'🎲 Rolling…'
    :G.lastRolls?'🎲 Results shown · click to re-roll next season'
    :canRoll?`🎲 Click here or press Roll Dice below${winter?' · ❄️ Winter Die active':''}`
    :'🎲 Dice Stage';

  const notices=[];
  if(G.loadedDice.length>0) notices.push(`<div class="stage-notice-line loaded">⚖️ Die ${G.loadedDice.map(i=>i+1).join(',')} loaded — weighted to curses</div>`);
  if(winter) notices.push(`<div class="stage-notice-line winter">❄️ Winter Season — the Winter Die rolls too!</div>`);

  const rollResult=G.lastRolls&&G.phase==='ACTION'&&!rolling?buildRollResult():'';
  const negEvent=G.phase!=='CARD'&&G.negEvent?`<div class="consequence-box"><div class="ct">⚠️ Curse struck!</div><div class="cd">${G.negEvent}</div></div>`:'';

  // Kingdom visual — top half
  const builtBuildings=BUILDINGS.filter(b=>getBuildingTier(b.id)>0);
  const kvHTML=builtBuildings.length
    ? builtBuildings.map(b=>{
        const tier=getBuildingTier(b.id);
        const td=b.tiers[tier-1];
        const prodStr=td.prod&&Object.keys(td.prod).length
          ? Object.entries(td.prod).map(([k,v])=>`+${v}${k==='grain'?'🌾':k==='gold'?'💰':k==='hammer'?'⚒️':'⚜️'}`).join('') : '';
        const imgSrc=`./images/buildings/${b.id}-${tier}.png`;
        const fallbackEmoji=td.icon||b.icon;
        return `<div class="kv-building tier${tier}" title="${td.name} · ${td.desc}">
          <div class="kv-img-wrap">
            <img class="kv-img" src="${imgSrc}" alt="${td.name}"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span class="kv-emoji" style="display:none">${fallbackEmoji}</span>
          </div>
          <div class="kv-name">${b.name}</div>
          <div class="kv-tier-name">${td.name}</div>
          <div class="kv-tier">${'●'.repeat(tier)}${'○'.repeat(b.tiers.length-tier)}</div>
          ${prodStr?`<div class="kv-prod">${prodStr}/s</div>`:''}
        </div>`;
      }).join('')
    : `<div class="kv-empty">🏰 No buildings yet — open Kingdom Builder to construct your empire</div>`;

  return `<div class="centre-panel">
    <div class="dice-stage-wrap">
      ${notices.length?`<div class="dice-stage-notice">${notices.join('')}</div>`:''}
      <div id="diceViewport" class="dice-viewport"></div>
      <div class="dice-stage-lbl ${rolling?'rolling':''}">${stageLabel}</div>
    </div>
    ${rollResult}
    ${negEvent}
    <div class="kingdom-visual">${kvHTML}</div>
  </div>`;
}

function buildRightPanel(){
  const pc=permCount();
  const rolling=G.rolling;
  const winter=isWinter(G.season);
  const regNegCount=G.dice.flat().filter(fid=>F[fid].neg).length-pc;
  const infCount=G.infections?G.infections.length:0;

  const diceFlat=G.dice.map((die,di)=>{
    const roll=G.lastRolls&&G.lastRolls[di]&&!G.lastRolls[di].isWinterDie?G.lastRolls[di]:null;
    const isLoaded=G.loadedDice.includes(di);
    const rolledBadge=roll?`<span class="die-rolled-badge">${roll.face.sym} rolled</span>`:'';
    const loadBadge=isLoaded?`<span style="font-size:.65em;color:#ffa040">⚖️ Loaded</span>`:'';
    const facesHTML=die.map((fid,fi)=>{
      const face=F[fid],isP=isPerm(di,fi),isRolled=roll&&roll.idx===fi;
      const isInf=isInfected(di,fi),isLeg=face.legendary;
      let cls='die-cube';
      if(isInf)cls+=' is-infected';
      else if(isP)cls+=' is-perm';
      else if(face.neg)cls+=' is-neg';
      if(isRolled)cls+=' is-rolled';
      if(isLoaded)cls+=' is-loaded';
      if(isLeg)cls+=' is-legendary';
      const legStyle=isLeg?` style="--leg-glow:${face.legendaryGlow||'#f5c842'}"`:''
      const lbl=isRolled?`▲ ${face.label}`:isP?`⛔ ${face.label}`:isInf?'🦠 Infected':face.label;
      return `<div class="${cls}"${legStyle}><span class="sym">${face.sym}</span><span class="lbl">${lbl}</span></div>`;
    }).join('');
    return `<div class="die-block">
      <div class="die-block-lbl">Die ${di+1}${rolledBadge}${loadBadge}</div>
      <div class="die-faces-grid">${facesHTML}</div>
    </div>`;
  }).join('');

  const winterBlock=winter?`<div class="die-block">
    <div class="die-block-lbl" style="color:#5090d0">❄️ Winter Die</div>
    <div class="die-faces-grid">${DIE_WINTER.map((fid,fi)=>{
      const face=F[fid];
      const isRolled=G.lastRolls&&G.lastRolls[G.dice.length]&&G.lastRolls[G.dice.length].idx===fi&&G.lastRolls[G.dice.length].isWinterDie;
      let cls='die-cube is-winter';if(isRolled)cls+=' is-rolled';
      return `<div class="${cls}"><span class="sym">${face.sym}</span><span class="lbl">${face.label}</span></div>`;
    }).join('')}</div>
  </div>`:'';

  const deathWarn=pc>=6?`<div class="death-warning">💀 ${pc}/${G.DEATH_THRESHOLD} perm curses — imminent defeat!</div>`
    :pc>=3?`<div class="perm-warning">⛔ ${pc} perm curse${pc>1?'s':''} — build Purification Shrine!</div>`
    :pc>=1?`<div class="perm-warning">🔒 ${pc} permanent curse${pc>1?'s':''}</div>`:'';
  const negWarn=regNegCount>0&&pc<3?`<div class="neg-warning">⚒️ ${regNegCount} curse${regNegCount>1?'s':''} — Forge to remove!</div>`:'';
  const infWarn=infCount>0?`<div class="neg-warning" style="border-color:#22c55e;color:#40d060">🦠 ${infCount} infected face${infCount>1?'s':''} — will spread if rolled!</div>`:'';

  return `<div class="right-panel">
    <div class="rp-header">Your Dice — All Faces</div>
    ${deathWarn||negWarn||infWarn?`<div class="warn-strip">${deathWarn}${negWarn}${infWarn}</div>`:''}
    <div class="dice-scroll">${diceFlat}${winterBlock}</div>
    <div class="game-log">${G.log.slice(0,30).map(e=>`<div class="log-entry ${lc(e)}">${lm(e)}</div>`).join('')}</div>
  </div>`;
}

function buildActionBar(){
  const ph=G.phase,ad=G.ad,rolling=G.rolling,frozen=ad.diceFrozen;
  const forgeOk=ph==='ACTION'&&ad.fr>0&&!ad.skipForge;
  const deedOk=ph==='ACTION'&&!ad.deedDone;
  const dieOk=ph==='ACTION'&&!ad.dieBought&&G.dice.length<4;
  const nextDie=dieOk?EXTRA_DICE[G.dice.length-2]:null;
  let content='';

  if(ph==='ROLL'){
    const hint=frozen?'🫥 Dice frozen — End Season to continue':rolling?'Rolling…':
      `Roll dice to collect resources${G.ad.extraRoll?' · Extra roll available!':''} · <kbd>Space</kbd> to roll`;
    content=`<span class="bar-phase">Roll Phase</span>
      <span class="bar-hint">${hint}</span>
      <button class="btn btn-roll" id="btnRoll" ${rolling||frozen?'disabled':''}>${rolling?'⏳ Rolling…':frozen?'🫥 Frozen':'🎲 Roll the Dice!'}</button>
      ${!rolling&&!frozen?`<button class="btn btn-end" id="btnEnd" style="opacity:.55" title="Skip rolling this season and go straight to actions">Skip Season</button>`:''}`;
  } else if(ph==='ACTION'){
    const forgeLabel=ad.fr<=0?'✓ Forged':ad.skipForge?'🚫 Forge Blocked':
      `⚒️ Forge${ad.frMax>1?` (${ad.fr} left)`:''}${ad.freeForge&&ad.fr>0?' ✨ FREE':''}`;
    const forgeTitle=ad.skipForge?'The Forge is blocked this season by a dark curse':
      ad.fr<=0?'Already forged this season':'Replace a curse face — costs Hammers';
    const prod=calcProd(),prodTotal=Object.values(prod).reduce((a,b)=>a+b,0);
    const prodStr=prodTotal>0?[prod.grain>0?`🌾+${prod.grain}`:'',prod.gold>0?`💰+${prod.gold}`:'',prod.hammer>0?`⚒️+${prod.hammer}`:'',prod.glory>0?`⚜️+${prod.glory}`:''].filter(Boolean).join(' '):'';
    content=`<span class="bar-phase">Action Phase</span>
      ${prodStr?`<span class="bar-prod" title="Earned at end of season from buildings">📦 ${prodStr}/season</span><div class="bar-sep"></div>`:''}
      <button class="btn btn-forge ${ad.fr<=0||ad.skipForge?'done':''}" id="btnForge" ${!forgeOk?'disabled':''} title="${forgeTitle}">${forgeLabel}</button>
      <button class="btn btn-deed ${ad.deedDone?'done':''}" id="btnDeed" ${!deedOk?'disabled':''} title="${ad.deedDone?'Already built this season':'Construct or upgrade a building'}">${ad.deedDone?'✓ Built':'🏰 Kingdom Builder'}</button>
      ${dieOk&&nextDie?`<button class="btn btn-die" id="btnBuyDie" title="${nextDie.desc}">🎲 ${nextDie.label}</button>`:''}
      <span class="bar-hint" style="flex:1">Forge to improve dice · Build for passive income</span>
      <button class="btn btn-end" id="btnEnd" title="End this season and advance to the next">End Season →</button>`;
  } else {
    content=`<span class="bar-hint" style="opacity:.5">Waiting…</span>`;
  }
  return `<div class="action-bar">${content}</div>`;
}

function buildCardModal(){
  const card=G.pendingCard;if(!card)return'';
  const isGood=card.t==='good';
  const isVisitor=card.t==='visitor';
  const eff=cardEffectText(card).split('\n').join('<br>');
  return `<div class="sc-overlay"><div class="sc-box ${isGood||isVisitor?'good':'bad'}">
    <div class="sc-s-lbl">${sIcon(G.season)} ${sName(G.season)} — Season ${G.season}</div>
    <div class="sc-icon">${card.i}</div>
    <div class="sc-name">${card.name}</div>
    <div class="sc-desc">${card.desc}</div>
    <div class="sc-effect">${eff}</div>
    <button class="btn-dismiss" id="btnDismissCard">${isVisitor?'See What They Offer':isGood?'Accept the Blessing':'Accept Your Fate'}</button>
  </div></div>`;
}

function buildRollResult(){
  const rolls=G.lastRolls;if(!rolls)return'';
  let grain=0,gold=0,hammer=0,glory=0;
  rolls.forEach(r=>{grain+=r.face.grain;gold+=r.face.gold;hammer+=r.face.hammer;glory+=r.face.glory;});
  const fc=rolls.map(r=>`<div class="rfc ${r.face.neg?'neg':''}">${r.face.sym} ${r.face.label}</div>`).join('');
  const gains=[];
  if(grain!==0)gains.push(`<div class="gc ${grain>0?'pos':'neg'}">🌾${grain>0?'+':''}${grain}</div>`);
  if(gold!==0) gains.push(`<div class="gc ${gold>0?'pos':'neg'}">💰${gold>0?'+':''}${gold}</div>`);
  if(hammer!==0)gains.push(`<div class="gc ${hammer>0?'pos':'neg'}">⚒️${hammer>0?'+':''}${hammer}</div>`);
  if(glory!==0)gains.push(`<div class="gc ${glory>0?'pos':'neg'}">⚜️${glory>0?'+':''}${glory}</div>`);
  return `<div class="roll-result"><div class="rlbl">── This Roll ──</div><div class="roll-faces">${fc}</div>${gains.length?`<div class="roll-gains">${gains.join('')}</div>`:''}</div>`;
}

function buildForgeModal(){
  const dieSlot=G.dice.length<4;
  let html='';
  const adv=hasAdvWorkshop();
  if(dieSlot){
    const idx=G.dice.length-2,opt=EXTRA_DICE[idx];
    if(opt){const ok=canAfford(G.resources,opt.cost);
      const cHTML=Object.entries(opt.cost).map(([k,v])=>`<span class="cc ${(G.resources[k]||0)>=v?'ok':'no'}">${k==='hammer'?'⚒️':k==='grain'?'🌾':'💰'}${v}</span>`).join('');
      html+=`<div class="tier-label" style="color:var(--blue)">Forge a New Die</div><div class="card-grid">
      <div class="forge-card special-die ${ok?'can':''}" data-newdie="${idx}">
        <div class="c-sym">🎲</div><div class="c-name">${opt.label}</div>
        <div class="cost-row">${cHTML}</div>
        <div class="afford" style="color:${ok?'var(--blue)':'var(--red)'}">${ok?'✓ Can forge':'✗ Need more'}</div>
      </div></div>`;
    }
  }
  const tc=['','#806010','#705010','#903010'];
  let lastTier=0;
  FORGE.forEach(u=>{
    const locked=u.requiresAdv&&!adv;
    if(u.tier!==lastTier){
      if(lastTier)html+='</div>';
      const tierLabel=u.tierName+(u.requiresAdv&&!adv?' 🔒':'');
      html+=`<div class="tier-label" style="color:${locked?'#888':tc[u.tier]}">${tierLabel}</div>`;
      if(locked)html+=`<div style="background:var(--red-bg);border:1px solid var(--red-bdr);border-radius:6px;padding:6px 10px;font-size:.82em;color:var(--red);margin-bottom:6px">🔒 Build an <strong>Advanced Workshop</strong> in the Royal Decree Hall to unlock Rare forgings.</div>`;
      html+=`<div class="card-grid">`;
      lastTier=u.tier;
    }
    const face=F[u.faceId],free=G.ad.freeForge&&G.ad.fr>0,ok=!locked&&(free||canAfford(G.resources,u.cost));
    const cHTML=Object.entries(u.cost).map(([k,v])=>`<span class="cc ${free||(G.resources[k]||0)>=v?'ok':'no'}">${k==='hammer'?'⚒️':k==='grain'?'🌾':'💰'}${v}</span>`).join('');
    if(locked){
      html+=`<div class="forge-card" style="opacity:.45;cursor:not-allowed"><div class="c-sym">🔒</div><div class="c-name">${face.label}</div><div class="cost-row">${cHTML}</div><div class="afford" style="color:#888">🔒 Locked</div></div>`;
    } else {
      html+=`<div class="forge-card ${ok?'can':''}" data-forge="${u.faceId}">
        <div class="c-sym">${face.sym}</div><div class="c-name">${face.label}</div>
        <div class="cost-row">${cHTML}${free?'<span style="color:var(--green);font-size:.8rem;margin-left:3px">FREE</span>':''}</div>
        <div class="afford" style="color:${ok?'var(--green)':'var(--red)'}">${ok?'✓ Affordable':'✗ Need more'}</div>
      </div>`;
    }
  });
  html+='</div>';
  if(!adv){html+=`<div style="margin-top:10px;font-size:.82em;color:var(--text-dim);font-style:italic">⭐ Legendary faces are offered only by visiting creatures — keep an eye on event cards!</div>`;}

function buildDeedsModal(){

  }).join('');

  const trackColors={food:'#60a020',industry:'#8090a0',prestige:'#a060e0',grand:'#c04040'};
  let html='';

  BUILDING_TRACKS.forEach(track=>{
    const buildings=BUILDINGS.filter(b=>b.track===track.id);
    const col=trackColors[track.id]||'var(--gold-bright)';
    html+=`<div class="tier-label" style="color:${col}">${track.label}</div>`;
    html+=`<div class="card-grid bld-grid">`;

    buildings.forEach((b,bi)=>{
      const curTier=getBuildingTier(b.id);
      const nextT=getNextTier(b);
      const unlocked=isBuildingUnlocked(b);
      const maxed=curTier>=b.tiers.length;
      const canBuy=unlocked&&nextT&&canAfford(res,nextT.cost)&&!G.ad.deedDone;
      const clickable=canBuy?`data-bldid="${b.id}"`:'';

      // Tier pips
      const pips=b.tiers.map((t,i)=>`<span class="tier-pip ${i<curTier?'done':i===curTier?'next':''}">${i<curTier?'●':'○'}</span>`).join('');

      // Status line
      let status='';
      if(!unlocked) status=`<div class="bld-locked">🔒 ${b.requiresDesc}</div>`;
      else if(maxed) status=`<div class="bld-maxed">⭐ Max</div>`;
      else if(curTier>0){
        const cp=b.tiers[curTier-1].prod||{};
        const ps=Object.entries(cp).map(([k,v])=>`+${v}${k==='grain'?'🌾':k==='gold'?'💰':k==='hammer'?'⚒️':'⚜️'}`).join(' ');
        status=`<div class="bld-current">T${curTier}: ${b.tiers[curTier-1].name}${ps?` · ${ps}`:''}</div>`;
      }

      // Next tier block
      let next='';
      if(nextT&&unlocked){
        const prod=nextT.prod&&Object.keys(nextT.prod).length
          ?Object.entries(nextT.prod).map(([k,v])=>`+${v}${k==='grain'?'🌾':k==='gold'?'💰':k==='hammer'?'⚒️':'⚜️'}`).join(' '):'';
        next=`<div class="bld-next">
          <div class="bld-up-header">
            <span class="bld-tier-num">T${curTier+1}</span>
            <span class="bld-tier-name">${nextT.icon||b.icon} ${nextT.name}</span>
            ${nextT.special?`<span class="bld-special">✨</span>`:''}
          </div>
          <div class="bld-tier-effect">${nextT.desc}</div>
          <div class="${prod?'bld-tier-prod':'bld-tier-glory'}">${prod?`${prod}/s · `:''}⚜️+${nextT.glory}</div>
          <div class="cost-row">${costFmt(nextT.cost)}</div>
          <div class="${canBuy?'bld-cta':'bld-cant'}">${canBuy?'Click to build →':'Not enough resources'}</div>
        </div>`;
      }

      // Connector arrow between buildings in same track
      const arrow=bi<buildings.length-1?`<div class="bld-track-arrow">→</div>`:'';

      html+=`<div class="bld-card ${curTier>0?'built':''} ${!unlocked?'locked':''} ${canBuy?'buyable':''}" ${clickable} title="${b.desc}">
        <div class="bld-card-top">
          <span class="bld-icon">${b.tiers[Math.max(0,curTier-1)]?.icon||b.icon}</span>
          <div style="flex:1;min-width:0">

    });

  return `<div class="overlay"><div class="modal modal-wide">
    <div class="modal-title">🏰 Kingdom Builder</div>
    <div class="modal-sub">🌾${res.grain} · 💰${res.gold} · ⚒️${res.hammer}${G.ad.deedDone?' · <span style="color:var(--text-faint)">Already built this season</span>':''}</div>

function bindEvents(){
  const on=(id,fn)=>{const el=document.getElementById(id);if(el)el.addEventListener('click',fn);};
  const onAll=(sel,fn)=>document.querySelectorAll(sel).forEach(el=>el.addEventListener('click',fn));
  onAll('[data-diff]',e=>{G=initGame(e.currentTarget.dataset.diff);render();});
  on('btnRoll',doRoll);
  // Canvas click to roll
  const vp=document.getElementById('diceViewport');
  if(vp)vp.addEventListener('click',()=>{
    if(G&&G.phase==='ROLL'&&!G.rolling&&!G.ad.diceFrozen)doRoll();
  });
  on('btnForge',()=>{G.modal='forge';render();});
  on('btnDeed',()=>{G.modal='deeds';render();});
  on('btnBuyDie',doBuyDie);
  on('btnEnd',doEndSeason);
  on('btnDismissCard',doDismissCard);
  on('btnCloseForge',()=>{G.modal=null;render();});
  on('btnCloseForge2',()=>{G.modal=null;G.pendingUpgrade=null;render();});
  on('btnCloseDeeds',()=>{G.modal=null;render();});
  on('btnBackForge',()=>{G.modal='forge';G.pendingUpgrade=null;render();});
  on('btnCloseRemPerm',()=>{G.modal=null;render();});
  on('btnCloseFaceSwap',()=>{G.modal=null;G.pendingFaceSwap=null;G.phase=G.ad.diceFrozen?'ACTION':'ROLL';render();});
  on('btnVisitorAccept',doVisitorAccept);
  on('btnVisitorDecline',doVisitorDecline);
  on('btnRestart',()=>{G=null;render();});
  on('btnOpenSettings',()=>{S.showSettings=true;render();});
  on('btnCloseSettings',()=>{S.showSettings=false;render();});
  on('settingsOverlay',e=>{if(e.target.id==='settingsOverlay'){S.showSettings=false;render();}});
  onAll('[data-theme]',e=>{S.theme=e.currentTarget.dataset.theme;applySettings();render();});
  const fs=document.getElementById('fontSlider');
  if(fs){
    fs.addEventListener('input',()=>{S.fontSize=parseInt(fs.value);applySettings();
      const lbl=document.getElementById('fontSizeVal');if(lbl)lbl.textContent=S.fontSize+'px';
    });
    fs.addEventListener('change',()=>render()); // only full re-render on release
  }
  const tc=document.getElementById('textColorInput');
  if(tc){tc.addEventListener('input',()=>{S.textColor=tc.value;applySettings();});}
  on('btnResetTextColor',()=>{S.textColor='';applySettings();render();});
  onAll('.forge-card.can[data-forge]',e=>{
    const u=FORGE.find(x=>x.faceId===e.currentTarget.dataset.forge);if(!u)return;
    const free=G.ad.freeForge&&G.ad.fr>0;
    if(!free&&!canAfford(G.resources,u.cost))return;
    G.pendingUpgrade=u;G.modal='forge_face';render();
  });
  onAll('.forge-card.can[data-newdie]',e=>{
    const idx=parseInt(e.currentTarget.dataset.newdie),opt=EXTRA_DICE[idx];
    if(!opt||!canAfford(G.resources,opt.cost))return;
    G.resources=spend(G.resources,opt.cost);G.dice.push([...opt.starts]);
    addLog({msg:`🎲 Forged a new die! Now rolling ${G.dice.length} dice per season.`,cls:'log-good'});
    G.modal=null;render();
  });
  onAll('.face-btn:not(.is-perm)',e=>{
    if(G.modal==='faceswap'){
      const di=parseInt(e.currentTarget.dataset.die),fi=parseInt(e.currentTarget.dataset.face);
      if(isPerm(di,fi))return;
      if(!G.pendingFaceSwap){G.pendingFaceSwap={di,fi};render();}
      else{doFaceSwap(G.pendingFaceSwap.di,G.pendingFaceSwap.fi,di,fi);}
    } else {
      doForge(parseInt(e.currentTarget.dataset.die),parseInt(e.currentTarget.dataset.face));
    }
  });
  // Legendary faces can also target perm curse faces
  onAll('.face-btn.is-perm',e=>{
    if(G.modal==='forge_face'&&G.pendingUpgrade?.isLegendary){
      doForge(parseInt(e.currentTarget.dataset.die),parseInt(e.currentTarget.dataset.face));
    }
  });
  onAll('.bld-card.buyable',e=>doBuyBuilding(e.currentTarget.dataset.bldid));
  onAll('[data-permidx]',e=>doRemovePermanent(parseInt(e.currentTarget.dataset.permidx)));
  // ── Keyboard shortcuts — bound once globally, not per-render ───────────────
  if(!window._kbBound){
    window._kbBound=true;
    document.addEventListener('keydown',e=>{
      if(!G)return;
      if(e.key==='Escape'){
        if(S.showSettings){S.showSettings=false;render();return;}
        if(G.modal){G.modal=null;G.pendingUpgrade=null;G.pendingFaceSwap=null;render();return;}
      }
      if((e.key===' '||e.key==='Enter')&&e.target===document.body){
        if(G.phase==='ROLL'&&!G.rolling&&!G.ad.diceFrozen){e.preventDefault();doRoll();}
        else if(G.phase==='CARD'&&G.pendingCard){e.preventDefault();doDismissCard();}
      }
    });
  }
}

// ═══════════════════════════
//  GAME ACTIONS
// ═══════════════════════════
function doRoll(){
  if(G.rolling)return;
  if(G.ad.diceFrozen){addLog({msg:'🫥 Your dice are frozen by dark magic — cannot roll!',cls:'log-perm'});return;}
  // First roll always allowed; subsequent rolls only if extraRoll is active
  if(G.rollCount>0&&!G.ad.extraRoll){return;}
  const winter=isWinter(G.season);
  const allDice=winter?[...G.dice,[...DIE_WINTER]]:G.dice;
  const rolls=allDice.map((die,di)=>{
    const isPlayerDie=di<G.dice.length;
    const isLoaded=isPlayerDie&&G.loadedDice.includes(di);
    let idx;
    if(isLoaded&&Math.random()<0.6){
      const negIdxs=die.map((fid,fi)=>({fid,fi})).filter(x=>F[x.fid].neg);
      if(negIdxs.length){idx=negIdxs[Math.floor(Math.random()*negIdxs.length)].fi;}
      else{idx=Math.floor(Math.random()*6);}
    } else {
      idx=Math.floor(Math.random()*6);
    }
    return{idx,face:F[die[idx]],isWinterDie:!isPlayerDie,dieIdx:di,faceIdx:idx};
  });
  G._pendingRolls=rolls;G.rolling=true;G.rollGen++;G.phase='ROLL';
  if(G.ad.extraRoll&&G.rollCount>0)G.ad.extraRoll=false; // consume extra roll on 2nd roll
  G.rollCount++;
  render();
}

function checkAllCursedDie(){
  // Instant loss if any single *player* die has ALL 6 faces as curse faces
  for(let di=0;di<G.dice.length;di++){
    const allCursed=G.dice[di].every(fid=>F[fid].neg);
    if(allCursed){
      G.wonGame=false;G.phase='GAME_OVER';
      G.deathReason=`Die ${di+1} was entirely consumed by curse faces — the dark forces have overwhelmed your kingdom!`;
      addLog({msg:`💀 Die ${di+1} is fully cursed! The kingdom crumbles!`,cls:'log-perm'});
      return true;
    }
  }
  return false;
}
function applyRollResults(rolls){
  let grain=0,gold=0,hammer=0,glory=0;const negs=[];
  rolls.forEach(r=>{grain+=r.face.grain;gold+=r.face.gold;hammer+=r.face.hammer;glory+=r.face.glory;if(r.face.neg)negs.push(r.face.negEvent);});
  G.resources.grain =Math.max(0,(G.resources.grain ||0)+grain);
  G.resources.gold  =Math.max(0,(G.resources.gold  ||0)+gold);
  G.resources.hammer=Math.max(0,(G.resources.hammer||0)+hammer);
  G.glory           =Math.max(0,G.glory+glory);
  const gains=[grain?`🌾${grain>0?'+':''}${grain}`:'',gold?`💰${gold>0?'+':''}${gold}`:'',hammer?`⚒️${hammer>0?'+':''}${hammer}`:'',glory?`⚜️${glory>0?'+':''}${glory}`:''].filter(Boolean).join(' ');
  const winterRoll=rolls.find(r=>r.isWinterDie);
  const regularRollsSyms=rolls.filter(r=>!r.isWinterDie).map(r=>r.face.sym).join(' ');
  const winterPart=winterRoll?` ❄️[${winterRoll.face.sym}]`:'';
  addLog({msg:`🎲 Rolled: ${regularRollsSyms}${winterPart} → ${gains||'nothing'}`,cls:negs.length?'log-neg':''});
  if(winterRoll&&winterRoll.face.neg)addLog({msg:`❄️ Winter Curse: ${winterRoll.face.negEvent}`,cls:'log-cb'});
  // Check if any infected face was rolled — spread infection
  if(G.infections&&G.infections.length){
    rolls.forEach(r=>{
      if(r.isWinterDie)return;
      if(G.infections.some(inf=>inf.die===r.dieIdx&&inf.face===r.faceIdx)){
        spreadInfection();
      }
    });
  }
  if(negs.length)G.negEvent=negs.join(' | ');else G.negEvent=null;
  if(G.glory>=G.diff.target){G.wonGame=true;G.phase='GAME_OVER';}
}
function doForge(dieIdx,faceIdx){
  const u=G.pendingUpgrade;if(!u)return;
  // Legendary faces can replace permanent curses — otherwise block perm faces
  const isLegendaryInstall=u.isLegendary&&isPerm(dieIdx,faceIdx);
  if(isPerm(dieIdx,faceIdx)&&!isLegendaryInstall)return;
  const free=G.ad.freeForge&&G.ad.fr>0;
  // For legendary visitor installs, cost is already paid — skip afford check
  if(!u.isLegendary&&!free&&!canAfford(G.resources,u.cost))return;
  const oldFace=F[G.dice[dieIdx][faceIdx]];
  // If legendary replacing a perm curse, remove from permanentCurses
  if(isLegendaryInstall){
    G.permanentCurses=G.permanentCurses.filter(p=>!(p.die===dieIdx&&p.face===faceIdx));
    addLog({msg:`⭐ Legendary power shatters the permanent curse on Die ${dieIdx+1}!`,cls:'log-cg'});
  }
  G.dice[dieIdx][faceIdx]=u.faceId;
  // Remove infection if face was infected
  if(G.infections)G.infections=G.infections.filter(inf=>!(inf.die===dieIdx&&inf.face===faceIdx));
  // If forging away the last negative face on a loaded die, remove the loaded curse
  const stillNeg=G.dice[dieIdx].some(fid=>F[fid].neg);
  if(!stillNeg&&G.loadedDice.includes(dieIdx)){
    G.loadedDice=G.loadedDice.filter(i=>i!==dieIdx);
    addLog({msg:`⚖️ Die ${dieIdx+1} is no longer loaded — the curse is broken!`,cls:'log-good'});
  }
  if(u.isLegendary){addLog({msg:`⭐ Legendary Face installed on Die ${dieIdx+1}: ${oldFace.sym}→${F[u.faceId].sym} ${F[u.faceId].label}!`,cls:'log-cg'});}
  else if(free){G.ad.freeForge=false;addLog(`⚒️ FREE Forge Die ${dieIdx+1}: ${oldFace.sym}→${F[u.faceId].sym}`);}
  else{G.resources=spend(G.resources,u.cost);addLog(`⚒️ Forged Die ${dieIdx+1}: ${oldFace.sym}→${F[u.faceId].sym}`);}
  G.ad.fr=Math.max(0,G.ad.fr-1);
  G.modal=null;G.pendingUpgrade=null;
  checkAllCursedDie();
  render();
}
function doBuyDeed(deedId){ doBuyBuilding(deedId); } // backward compat
function doBuyBuilding(bldId){
  const b=getBuildingData(bldId);
  // Handle legacy special deeds (purify/quarantine from DEEDS array)
  if(!b){
    const deed=DEEDS.find(d=>d.id===bldId);
    if(!deed||!canAfford(G.resources,deed.cost))return;
    G.resources=spend(G.resources,deed.cost);G.glory+=deed.glory;
    G.deeds.push(bldId);
    addLog({msg:`📜 ${deed.icon} ${deed.name}`,cls:'log-cg'});
    G.modal=null;G.ad.deedDone=true;
    if(deed.special==='removePermanent'){G.permanentCurses.length>0?G.modal='removePerm':addLog({msg:'✨ No permanent curses to remove.',cls:'log-good'});}
    if(deed.special==='cureInfection'){cureAllInfections();}
    if(G.glory>=G.diff.target){G.wonGame=true;G.phase='GAME_OVER';G.modal=null;}
    render();return;
  }
  if(!isBuildingUnlocked(b))return;
  const nextT=getNextTier(b);
  if(!nextT||!canAfford(G.resources,nextT.cost))return;
  G.resources=spend(G.resources,nextT.cost);
  G.glory+=nextT.glory;
  if(!G.buildings)G.buildings={};
  G.buildings[bldId]=(G.buildings[bldId]||0)+1;
  const newTier=G.buildings[bldId];
  addLog({msg:`🏰 ${nextT.icon||b.icon} ${b.name} → Tier ${newTier}: ${nextT.name}! +${nextT.glory}⚜️`,cls:'log-cg'});
  G.ad.deedDone=true;
  // Handle specials
  if(nextT.special==='removePermanent'){G.permanentCurses.length>0?G.modal='removePerm':addLog({msg:'✨ Purification: no permanent curses found.',cls:'log-good'});}
  else if(nextT.special==='removePermanent2'){
    if(G.permanentCurses.length>0){G.modal='removePerm';}
    else{addLog({msg:'✨ No curses to remove.',cls:'log-good'});}
  }
  else if(nextT.special==='removePermanentAll'){
    const n=G.permanentCurses.length;
    G.permanentCurses.forEach(p=>{G.dice[p.die][p.face]='GLORY_1';});
    G.permanentCurses=[];
    addLog({msg:`✨ Sacred Sanctum: ALL ${n} permanent curses cleansed!`,cls:'log-perm'});
    G.modal=null;
  }
  else if(nextT.special==='cureInfection'||nextT.special==='cureInfectionPerm'){cureAllInfections();}
  else if(nextT.special==='unlockRare'){addLog({msg:'🏭 Dwarven Foundry built — Rare forge tier UNLOCKED!',cls:'log-cg'});}
  else{G.modal=null;}
  if(G.glory>=G.diff.target){G.wonGame=true;G.phase='GAME_OVER';G.modal=null;}
  render();
}
function doRemovePermanent(idx){
  const p=G.permanentCurses[idx];if(!p)return;
  const oldFace=F[G.dice[p.die][p.face]];
  G.dice[p.die][p.face]='GLORY_1';G.permanentCurses.splice(idx,1);
  addLog({msg:`✨ Purification Rite: Die ${p.die+1} cleansed! ${oldFace.sym} → ⚜️`,cls:'log-perm'});
  G.modal=null;render();
}
function doFaceSwap(di1,fi1,di2,fi2){
  if(di1===di2&&fi1===fi2)return;
  if(isPerm(di1,fi1)||isPerm(di2,fi2)){addLog({msg:'⛔ Cannot swap permanent curse faces!',cls:'log-perm'});return;}
  const tmp=G.dice[di1][fi1];
  G.dice[di1][fi1]=G.dice[di2][fi2];
  G.dice[di2][fi2]=tmp;
  // Update loaded curse: if we swapped in/out a neg face check if loaded status should change
  [di1,di2].forEach(di=>{
    const stillNeg=G.dice[di].some(fid=>F[fid].neg);
    if(!stillNeg&&G.loadedDice.includes(di)){G.loadedDice=G.loadedDice.filter(i=>i!==di);addLog({msg:`⚖️ Die ${di+1} loaded curse lifted!`,cls:'log-good'});}
  });
  addLog({msg:`🃏 Face swap! Die ${di1+1} ↔ Die ${di2+1}`,cls:'log-good'});
  G.modal=null;G.pendingFaceSwap=null;G.ad.faceSwap=false;
  G.phase=G.ad.diceFrozen?'ACTION':'ROLL';
  render();
}
function doBuyDie(){
  const idx=G.dice.length-2,opt=EXTRA_DICE[idx];
  if(!opt||!canAfford(G.resources,opt.cost)||G.dice.length>=4)return;
  G.resources=spend(G.resources,opt.cost);G.dice.push([...opt.starts]);
  addLog({msg:`🎲 Forged ${G.dice.length===3?'3rd':'4th'} die! Now rolling ${G.dice.length} dice/season.`,cls:'log-good'});
  G.ad.dieBought=true;render();
}
function doEndSeason(){
  G.negEvent=null;
  // Check death before applying production — don't give resources on a losing turn
  if(G.permanentCurses.length>=G.DEATH_THRESHOLD){
    G.wonGame=false;G.phase='GAME_OVER';
    G.deathReason=`${G.permanentCurses.length} permanent curses have overwhelmed the kingdom after ${G.season} seasons.`;
    addLog({msg:`💀 The kingdom falls after ${G.season} seasons!`,cls:'log-perm'});
    render();return;
  }
  applyProd();
  // Check win after production (production could push over target)
  if(G.glory>=G.diff.target){G.wonGame=true;G.phase='GAME_OVER';G.modal=null;render();return;}
  G.season++;G.ad={fr:1,frMax:1,freeForge:false,skipForge:false,deedDone:false,dieBought:false,extraRoll:false,diceFrozen:false,faceSwap:false};
  G.lastRolls=null;G.rolling=false;G._pendingRolls=null;G.rollCount=0;
  const card=drawCard();G.pendingCard=card;G.phase='CARD';
  addLog(`${sIcon(G.season)} ${sName(G.season)}, Season ${G.season} begins.`);
  if(isWinter(G.season))addLog({msg:'❄️ Winter is here — the Winter Die joins the roll! Brace for hardship.',cls:'log-cb'});
  render();
}
function doDismissCard(){
  const card=G.pendingCard;if(!card)return;
  applyCardEffect(card);G.pendingCard=null;
  // If modal set (faceswap, visitor), stay in that modal flow
  if(G.modal==='faceswap'||G.modal==='visitor'){render();return;}
  // extraRoll: stay on ROLL phase so player can roll again; don't go to ACTION
  G.phase=G.ad.diceFrozen?'ACTION':'ROLL';
  if(G.permanentCurses.length>=G.DEATH_THRESHOLD){
    G.wonGame=false;G.phase='GAME_OVER';
    G.deathReason=`The Witch's Coven placed ${G.permanentCurses.length} permanent curses upon the land.`;
    addLog({msg:'💀 Permanent curses overwhelm the kingdom!',cls:'log-perm'});
  }
  if(checkAllCursedDie()){render();return;}
  render();
}

function doVisitorAccept(){
  const v=G.pendingVisitor;if(!v)return;
  const face=F[v.faceId];
  if(!canAfford(G.resources,v.cost)){addLog({msg:`${v.icon} Not enough resources — ${v.name} departs.`,cls:'log-cb'});G.modal=null;G.pendingVisitor=null;render();return;}
  G.resources=spend(G.resources,v.cost);
  G.modal='forge_face';
  G.pendingUpgrade={faceId:v.faceId,cost:{},isLegendary:true};
  addLog({msg:`${v.icon} ${v.name}: legendary face ${face.sym} ${face.label} installed!`,cls:'log-cg'});
  G.pendingVisitor=null;
  render();
}
function doVisitorDecline(){
  const v=G.pendingVisitor;
  if(v)addLog({msg:`${v.icon} ${v.name} shrugs and departs.`,cls:'log-prod'});
  G.modal=null;G.pendingVisitor=null;
  G.phase=G.ad.diceFrozen?'ACTION':'ROLL';
  render();
}

render();
</script>
