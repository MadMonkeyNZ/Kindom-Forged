/* ═══════════════════════════════════════════════════════════════
   KINGDOM DICE FORGE — Complete UI redesign for 16:9 desktop
   Layout: fixed-height, no page scroll, three-panel + bottom bar
   ═══════════════════════════════════════════════════════════════ */

/* ── THEME VARS ── */
:root{
  --bg:#2a1f0e;--bg-mid:#1e1608;--bg-panel:#221a0a;--bg-deep:#150f04;
  --border:#7a5a18;--border-light:#b08030;
  --text:#f0e8d0;--text-dim:#c8a870;--text-faint:#806838;
  --gold:#f5c842;--gold-bright:#f5c842;--gold-glow:#ffe080;
  --red:#f06050;--red-bg:#2a0808;--red-bdr:#802020;
  --perm-red:#ff4040;--perm-bg:#1e0404;--perm-bdr:#aa1818;
  --green:#80d840;--green-bg:#0e2008;--green-bdr:#408018;
  --purple:#c080ff;--purple-bg:#180830;--purple-bdr:#6030a0;
  --blue:#60b8f8;
  --die-bg:#2e2008;--die-border:#8a6020;
  --canvas-table:#1a3010;
  --shadow:0 2px 8px rgba(0,0,0,.5);
  --shadow-lg:0 4px 24px rgba(0,0,0,.7);
  --bar-h:68px;
  --left-w:280px;
  --right-w:340px;
  --hdr-h:58px;
}
body.theme-parchment{
  --bg:#f4ead0;--bg-mid:#ede0be;--bg-panel:#faf4e4;--bg-deep:#e8d5a8;
  --border:#a07828;--border-light:#c8a840;
  --text:#1a1004;--text-dim:#5a3c10;--text-faint:#8a5c20;
  --gold:#8a5c10;--gold-bright:#b07820;--gold-glow:#d4a030;
  --red:#b01818;--red-bg:#fdf0f0;--red-bdr:#d04040;
  --perm-red:#cc0000;--perm-bg:#fff0f0;--perm-bdr:#cc2020;
  --green:#1a6010;--green-bg:#f0fae8;--green-bdr:#4a9020;
  --purple:#5020a0;--purple-bg:#f4eeff;--purple-bdr:#8040d0;
  --blue:#1050a0;
  --die-bg:#f0e0b0;--die-border:#a07020;
  --canvas-table:#c8a860;
  --shadow:0 2px 8px rgba(0,0,0,.15);
  --shadow-lg:0 4px 20px rgba(0,0,0,.2);
}
body.theme-royal{
  --bg:#0c1428;--bg-mid:#111e38;--bg-panel:#162040;--bg-deep:#090f1e;
  --border:#2848a0;--border-light:#5070c8;
  --text:#d0dcff;--text-dim:#8098d0;--text-faint:#4860a8;
  --gold:#f5c842;--gold-bright:#f5c842;--gold-glow:#ffe080;
  --red:#f05060;--red-bg:#200814;--red-bdr:#802040;
  --perm-red:#ff3050;--perm-bg:#180310;--perm-bdr:#c01830;
  --green:#40d880;--green-bg:#082018;--green-bdr:#208050;
  --purple:#b060ff;--purple-bg:#180830;--purple-bdr:#6030c0;
  --blue:#4090f8;
  --die-bg:#162040;--die-border:#4060c0;
  --canvas-table:#0c183a;
  --shadow:0 2px 8px rgba(0,0,40,.5);
  --shadow-lg:0 4px 20px rgba(0,0,40,.7);
}
body.theme-forest{
  --bg:#0e1e0a;--bg-mid:#162210;--bg-panel:#182814;--bg-deep:#0a1408;
  --border:#3a6818;--border-light:#5a9830;
  --text:#d0ecc0;--text-dim:#80b060;--text-faint:#408030;
  --gold:#d8c040;--gold-bright:#d8c040;--gold-glow:#f0e060;
  --red:#f06040;--red-bg:#200806;--red-bdr:#803020;
  --perm-red:#ff4030;--perm-bg:#1a0404;--perm-bdr:#a01818;
  --green:#60e040;--green-bg:#0a2008;--green-bdr:#308020;
  --purple:#c080e0;--purple-bg:#180828;--purple-bdr:#6030a0;
  --blue:#50b8e0;
  --die-bg:#162010;--die-border:#4a7820;
  --canvas-table:#182808;
  --shadow:0 2px 8px rgba(0,10,0,.5);
  --shadow-lg:0 4px 20px rgba(0,10,0,.7);
}

/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
html{font-size:19px;}
body{font-family:'Crimson Text',Georgia,serif;background:var(--bg);color:var(--text);line-height:1.4;}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── SCROLLBARS ── */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg-deep);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ═══════════════════════════ HEADER BAR ═══════════════════════════ */
.top-bar{
  height:var(--hdr-h);min-height:var(--hdr-h);flex-shrink:0;
  background:var(--bg-panel);border-bottom:2px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:12px;position:relative;
}
.top-bar-title{
  font-family:'Cinzel',serif;font-size:.95em;font-weight:900;
  color:var(--gold-bright);letter-spacing:2px;white-space:nowrap;flex-shrink:0;
}
.top-bar-season{
  font-family:'Cinzel',serif;font-size:.75em;color:var(--text-dim);
  white-space:nowrap;flex-shrink:0;letter-spacing:1px;
}
.top-bar-track{display:flex;align-items:center;gap:3px;flex:1;overflow:hidden;padding:0 6px;}
.s-pip{
  width:20px;height:20px;border-radius:50%;border:1px solid var(--border);
  background:var(--bg-mid);display:flex;align-items:center;justify-content:center;
  font-size:.55em;font-family:'Cinzel',serif;color:var(--text-faint);
  flex-shrink:0;transition:all .3s;
}
.s-pip.done{background:var(--bg-deep);color:var(--text-faint);}
.s-pip.active{background:var(--gold-bright);border-color:var(--gold-bright);color:#1a0;font-weight:bold;box-shadow:0 0 8px var(--gold-glow);}
.top-bar-status{
  font-size:.75em;color:var(--text-dim);font-style:italic;
  white-space:nowrap;flex-shrink:0;
}
.top-bar-status strong{color:var(--gold-bright);}
.settings-btn{
  background:var(--bg-mid);border:1px solid var(--border);border-radius:6px;
  padding:4px 9px;cursor:pointer;color:var(--text-dim);
  font-family:'Cinzel',serif;font-size:.7em;letter-spacing:1px;
  transition:all .2s;flex-shrink:0;
}
.settings-btn:hover{border-color:var(--gold-bright);color:var(--gold-bright);}

/* ═══════════════════════════ MAIN AREA ═══════════════════════════ */
.main-area{
  flex:1;display:flex;overflow:hidden;
  /* subtract top bar and bottom bar */
  min-height:0;
}

/* ═══════════════════════════ LEFT PANEL ═══════════════════════════ */
.left-panel{
  width:var(--left-w);min-width:var(--left-w);flex-shrink:0;
  background:var(--bg-panel);border-right:2px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;
}
.lp-section{border-bottom:1px solid var(--border);padding:10px 12px;}
.lp-title{
  font-family:'Cinzel',serif;font-size:.6em;letter-spacing:2px;
  color:var(--gold-bright);text-transform:uppercase;margin-bottom:8px;
  border-bottom:1px solid var(--border);padding-bottom:4px;
}
.res-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.res-row:last-child{margin-bottom:0;}
.res-icon{font-size:1.1em;width:22px;text-align:center;flex-shrink:0;}
.res-val{font-family:'Cinzel',serif;font-size:1.15em;font-weight:700;color:var(--text);min-width:28px;}
.res-label{font-size:.68em;color:var(--text-faint);flex:1;}
.res-prod{font-size:.68em;color:var(--green);font-weight:700;margin-left:auto;white-space:nowrap;}

/* Prestige section */
.glory-num{font-family:'Cinzel',serif;font-size:2em;font-weight:700;color:var(--purple);line-height:1;}
.glory-label{font-size:.68em;color:var(--text-faint);letter-spacing:1px;margin-bottom:6px;}
.rank-name{font-family:'Cinzel',serif;font-size:.8em;color:var(--gold-bright);margin-bottom:3px;}
.rank-next{font-size:.63em;color:var(--text-faint);margin-bottom:5px;}
.prog-track{background:var(--bg-deep);border-radius:3px;height:5px;border:1px solid var(--border);overflow:hidden;margin-bottom:5px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--gold-glow));transition:width .5s;}
.target-row{display:flex;justify-content:space-between;align-items:center;font-size:.68em;}
.target-lbl{color:var(--text-faint);}
.target-val{color:var(--purple);font-weight:700;font-family:'Cinzel',serif;}
.curse-chip{
  margin-top:6px;display:flex;align-items:center;gap:5px;
  font-size:.68em;padding:4px 7px;border-radius:5px;
  border:1px solid var(--border);background:var(--bg-deep);
}
.curse-chip.danger{border-color:var(--perm-bdr);background:var(--perm-bg);color:var(--perm-red);}
.curse-chip.warn{border-color:var(--red-bdr);background:var(--red-bg);color:var(--red);}

/* Kingdom buildings in left panel */
.kv-list{display:flex;flex-direction:column;gap:5px;padding:8px 12px;}
.kv-item{display:flex;align-items:center;gap:7px;font-size:.75em;color:var(--text-dim);}
.kv-item-icon{font-size:1.1em;flex-shrink:0;}
.kv-item-name{flex:1;font-family:'Cinzel',serif;font-size:.8em;color:var(--text);letter-spacing:.5px;}
.kv-item-tier{font-size:.62em;color:var(--gold-bright);letter-spacing:1px;}
.kv-item-prod{font-size:.62em;color:var(--green);margin-left:auto;}
.kv-empty{font-size:.75em;color:var(--text-faint);font-style:italic;padding:8px 12px;}

/* ═══════════════════════════ CENTRE PANEL ═══════════════════════════ */
.centre-panel{
  flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;
  background:var(--bg-deep);
}
/* Kingdom visual — top half of centre */
.kingdom-visual{
  flex:1;min-height:0;
  background:var(--bg-panel);border-bottom:2px solid var(--border);
  display:flex;align-items:flex-end;gap:12px;padding:10px 14px;
  overflow-x:auto;overflow-y:hidden;
}
.kingdom-visual::-webkit-scrollbar{height:4px;}
.kingdom-visual::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.kv-building{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;cursor:default;transition:transform .2s;}
.kv-building:hover{transform:translateY(-3px);}
.kv-img-wrap{
  width:130px;height:100px;border-radius:8px;border:2px solid var(--border-light);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  background:var(--bg-mid);position:relative;transition:border-color .3s,box-shadow .3s;
}
.kv-building.tier1 .kv-img-wrap{opacity:.85;}
.kv-building.tier2 .kv-img-wrap{border-color:var(--border);}
.kv-building.tier3 .kv-img-wrap{border-color:var(--gold-bright);box-shadow:0 0 10px rgba(245,200,66,.35);}
.kv-building.tier4 .kv-img-wrap{border-color:var(--gold-bright);box-shadow:0 0 16px rgba(245,200,66,.6);animation:kvGlow 2s ease-in-out infinite;}
@keyframes kvGlow{0%,100%{box-shadow:0 0 8px rgba(245,200,66,.35);}50%{box-shadow:0 0 20px rgba(245,200,66,.8);}}
.kv-img{width:100%;height:100%;object-fit:cover;display:block;}
.kv-emoji{font-size:2.8em;line-height:1;}
.kv-name{font-size:.68em;color:var(--text-dim);text-align:center;line-height:1.2;font-weight:700;font-family:'Cinzel',serif;letter-spacing:.5px;}
.kv-tier-name{font-size:.58em;color:var(--text-faint);text-align:center;line-height:1.2;font-style:italic;}
.kv-tier{font-size:.6em;color:var(--gold-bright);font-weight:700;letter-spacing:1px;}
.kv-prod{font-size:.6em;color:var(--green);font-weight:700;}
.kv-empty{font-size:.78em;color:var(--text-faint);font-style:italic;padding:16px;text-align:center;width:100%;display:flex;align-items:center;justify-content:center;}

/* Dice stage — bottom half of centre */
.dice-stage-wrap{flex:1;min-height:0;position:relative;overflow:hidden;background:var(--canvas-table);cursor:pointer;display:flex;flex-direction:column;}
.dice-viewport{flex:1;min-height:0;display:block;width:100%;position:relative;}
.dice-stage-lbl{
  flex-shrink:0;
  background:rgba(0,0,0,.6);backdrop-filter:blur(2px);
  font-family:'Cinzel',serif;font-size:.68em;letter-spacing:2px;
  color:var(--text-faint);text-align:center;padding:5px 0;
  text-transform:uppercase;pointer-events:none;
}
.dice-stage-lbl.rolling{color:var(--gold-bright);animation:pulse .5s ease-in-out infinite alternate;}
@keyframes pulse{from{opacity:.6}to{opacity:1}}
.dice-stage-notice{
  position:absolute;top:0;left:0;right:0;z-index:5;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.stage-notice-line{font-size:.65em;text-align:center;padding:3px 10px;backdrop-filter:blur(2px);}
.stage-notice-line.loaded{background:rgba(138,64,0,.7);color:#ffc880;}
.stage-notice-line.winter{background:rgba(30,80,160,.7);color:#a0d0ff;}
/* Roll result strip */
.roll-result{
  flex-shrink:0;background:var(--bg-panel);border-top:1px solid var(--border);
  padding:5px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  min-height:34px;
}
.rlbl{font-size:.65em;color:var(--text-faint);letter-spacing:2px;text-transform:uppercase;white-space:nowrap;font-family:'Cinzel',serif;}
.roll-faces{display:flex;gap:4px;flex-wrap:wrap;flex:1;}
.rfc{background:var(--bg-deep);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:.78em;color:var(--text);}
.rfc.neg{border-color:var(--red-bdr);background:var(--red-bg);color:var(--red);}
.roll-gains{display:flex;gap:5px;flex-wrap:wrap;margin-left:auto;}
.gc{border-radius:4px;padding:2px 9px;font-size:.82em;font-weight:700;border:1px solid;}
.gc.pos{background:var(--green-bg);border-color:var(--green-bdr);color:var(--green);}
.gc.neg{background:var(--red-bg);border-color:var(--red-bdr);color:var(--red);}
/* Consequence */
.consequence-box{flex-shrink:0;background:var(--red-bg);border-top:2px solid var(--red-bdr);padding:5px 12px;text-align:center;}
.ct{font-family:'Cinzel',serif;font-size:.72em;color:var(--red);letter-spacing:1px;margin-bottom:2px;}
.cd{font-size:.78em;color:var(--red);}

/* ═══════════════════════════ RIGHT PANEL ═══════════════════════════ */
.right-panel{
  width:var(--right-w);min-width:var(--right-w);flex-shrink:0;
  background:var(--bg-panel);border-left:2px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.rp-header{
  font-family:'Cinzel',serif;font-size:.6em;letter-spacing:2px;
  color:var(--gold-bright);text-transform:uppercase;
  padding:7px 12px 5px;border-bottom:1px solid var(--border);
  background:var(--bg-deep);flex-shrink:0;
}
/* Scrollable dice area */
.dice-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 10px;}
.die-block{margin-bottom:10px;}
.die-block-lbl{
  font-size:.68em;color:var(--gold-bright);font-family:'Cinzel',serif;
  letter-spacing:1px;padding-bottom:4px;margin-bottom:4px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;
}
.die-rolled-badge{
  font-size:.85em;background:var(--gold-bright);color:#1a0a00;
  border-radius:3px;padding:1px 5px;font-weight:700;
}
/* 3-column face grid */
.die-faces-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}
.die-cube{
  background:var(--die-bg);border:1.5px solid var(--die-border);
  border-radius:7px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:5px 3px;
  min-height:48px;cursor:default;
  transition:border-color .2s,box-shadow .2s,transform .15s;
}
.die-cube .sym{font-size:1.1em;line-height:1.2;}
.die-cube .lbl{font-size:.56em;color:var(--text-faint);margin-top:2px;text-align:center;line-height:1.2;word-break:break-word;}
.die-cube.is-neg{border-color:var(--red-bdr);background:var(--red-bg);}
.die-cube.is-neg .lbl{color:var(--red);}
.die-cube.is-perm{border-color:var(--perm-bdr)!important;background:var(--perm-bg)!important;animation:permGlow 2s ease-in-out infinite;}
.die-cube.is-perm .lbl{color:var(--perm-red);}
@keyframes permGlow{0%,100%{box-shadow:0 0 4px 1px rgba(200,0,0,.2);}50%{box-shadow:0 0 10px 4px rgba(200,0,0,.45);}}
.die-cube.is-rolled{
  border-color:var(--gold-bright)!important;
  box-shadow:0 0 0 2px var(--gold-bright),0 0 14px 4px rgba(245,200,66,.6)!important;
  transform:scale(1.1);z-index:1;position:relative;
  animation:rolledPop .3s ease-out,rolledGlow 1.4s ease-in-out infinite;
}
.die-cube.is-rolled .lbl{color:var(--gold-bright)!important;font-weight:700;}
@keyframes rolledPop{0%{transform:scale(1.2);}100%{transform:scale(1.1);}}
@keyframes rolledGlow{0%,100%{box-shadow:0 0 0 2px var(--gold-bright),0 0 10px 3px rgba(245,200,66,.5);}50%{box-shadow:0 0 0 2px var(--gold-bright),0 0 20px 7px rgba(245,200,66,.8);}}
.die-cube.is-rolled.is-neg,.die-cube.is-rolled.is-perm{
  border-color:var(--red)!important;
  box-shadow:0 0 0 2px var(--red),0 0 12px 4px rgba(200,0,0,.55)!important;
  animation:rolledPop .3s ease-out,rolledGlowRed 1.4s ease-in-out infinite;
}
@keyframes rolledGlowRed{0%,100%{box-shadow:0 0 0 2px var(--red),0 0 10px 3px rgba(200,0,0,.4);}50%{box-shadow:0 0 0 2px var(--red),0 0 18px 6px rgba(200,0,0,.7);}}
.die-cube.is-winter{border-color:#5080b0!important;background:linear-gradient(135deg,#1a3060,#0e1e40)!important;}
.die-cube.is-winter .lbl{color:#80b0e0!important;}
.die-cube.is-infected{border-color:#22c55e!important;background:linear-gradient(135deg,#082010,#0e3018)!important;animation:infectPulse 1.5s ease-in-out infinite;}
.die-cube.is-infected .lbl{color:#40d060!important;}
@keyframes infectPulse{0%,100%{box-shadow:0 0 4px 1px rgba(34,197,94,.3);}50%{box-shadow:0 0 10px 4px rgba(34,197,94,.6);}}
.die-cube.is-legendary{animation:legendaryGlow 2s ease-in-out infinite;}
.die-cube.is-loaded{outline:1.5px dashed rgba(255,180,50,.5);outline-offset:2px;}
@keyframes legendaryGlow{0%,100%{box-shadow:0 0 6px 2px var(--leg-glow,#f5c842);border-color:var(--leg-glow,#f5c842);}50%{box-shadow:0 0 16px 6px var(--leg-glow,#f5c842);border-color:var(--leg-glow,#f5c842);}}

/* Warnings in right panel */
.warn-strip{padding:5px 10px;flex-shrink:0;}
.neg-warning{background:var(--red-bg);border-left:3px solid var(--red);padding:5px 10px;margin-bottom:4px;font-size:.72em;color:var(--red);}
.perm-warning{background:var(--perm-bg);border-left:3px solid var(--perm-bdr);padding:5px 10px;margin-bottom:4px;font-size:.72em;color:var(--perm-red);animation:permGlow 2.5s ease-in-out infinite;}
.death-warning{background:var(--perm-bg);border-left:3px solid var(--perm-red);padding:6px 10px;margin-bottom:4px;font-size:.75em;color:var(--perm-red);font-weight:700;}

/* Log at bottom of right panel */
.game-log{
  height:130px;min-height:130px;flex-shrink:0;
  background:var(--bg-deep);border-top:1px solid var(--border);
  padding:6px 10px;overflow-y:auto;
}
.log-entry{font-size:.7em;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text-faint);}
.log-entry:first-child{color:var(--text-dim);font-size:.75em;font-weight:600;}
.log-neg{color:var(--red)!important;}
.log-prod{color:var(--green)!important;font-weight:600;}
.log-good{color:var(--blue)!important;}
.log-cg{color:var(--green)!important;font-weight:600;}
.log-cb{color:var(--red)!important;font-weight:600;}
.log-perm{color:var(--perm-red)!important;font-weight:700;}

/* ═══════════════════════════ BOTTOM ACTION BAR ═══════════════════════════ */
.action-bar{
  height:var(--bar-h);min-height:var(--bar-h);flex-shrink:0;
  background:var(--bg-panel);border-top:2px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:10px;
  overflow-x:auto;
}
.action-bar::-webkit-scrollbar{height:3px;}
.bar-phase{
  font-family:'Cinzel',serif;font-size:.65em;letter-spacing:2px;
  color:var(--text-faint);text-transform:uppercase;white-space:nowrap;
  padding-right:10px;border-right:1px solid var(--border);margin-right:2px;
  flex-shrink:0;
}
.bar-hint{font-size:.78em;color:var(--text-faint);font-style:italic;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-prod{
  font-size:.75em;color:var(--green);font-weight:700;
  background:var(--green-bg);border:1px solid var(--green-bdr);
  border-radius:5px;padding:4px 9px;white-space:nowrap;flex-shrink:0;
}
.bar-sep{width:1px;height:28px;background:var(--border);flex-shrink:0;}

/* Buttons */
.btn{
  font-family:'Cinzel',serif;font-size:.78em;font-weight:700;letter-spacing:.5px;
  padding:8px 16px;border-radius:7px;border:2px solid transparent;
  cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.btn.done{opacity:.5;}
.btn-roll{background:var(--gold-bright);border-color:var(--gold-bright);color:#1a0a00;font-size:.88em;padding:9px 22px;}
.btn-roll:hover:not(:disabled){filter:brightness(1.12);transform:translateY(-1px);}
.btn-forge{background:var(--bg-mid);border-color:var(--border);color:var(--text);}
.btn-forge:hover:not(:disabled){border-color:var(--gold-bright);color:var(--gold-bright);}
.btn-deed{background:var(--green-bg);border-color:var(--green-bdr);color:var(--green);}
.btn-deed:hover:not(:disabled){filter:brightness(1.1);}
.btn-die{background:var(--purple-bg);border-color:var(--purple-bdr);color:var(--purple);}
.btn-die:hover:not(:disabled){filter:brightness(1.1);}
.btn-end{background:var(--red-bg);border-color:var(--red-bdr);color:var(--red);}
.btn-end:hover:not(:disabled){filter:brightness(1.1);}

/* ═══════════════════════════ MAIN MENU ═══════════════════════════ */
.diff-screen{
  position:fixed;inset:0;background:var(--bg);z-index:400;
  display:flex;align-items:center;justify-content:center;overflow-y:auto;padding:20px;
}
.diff-box{
  background:var(--bg-panel);border:2px solid var(--border);border-radius:14px;
  padding:28px 28px;max-width:680px;width:100%;box-shadow:var(--shadow-lg);
  text-align:center;margin:auto;
}
.diff-title{font-family:'Cinzel',serif;font-size:1.8em;font-weight:900;color:var(--gold-bright);letter-spacing:3px;margin-bottom:4px;}
.diff-sub{font-size:.88em;color:var(--text-dim);font-style:italic;margin-bottom:18px;}
.diff-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.diff-card{
  background:var(--bg-mid);border:2px solid var(--border-light);border-radius:10px;
  padding:14px 12px;cursor:pointer;transition:all .2s;text-align:left;
}
.diff-card:hover{border-color:var(--gold-bright);background:var(--bg-deep);transform:translateY(-2px);}
.d-name{font-family:'Cinzel',serif;font-size:.95em;color:var(--text);margin-bottom:4px;}
.d-target{font-size:1.4em;font-weight:700;color:var(--purple);margin-bottom:4px;}
.d-desc{font-size:.82em;color:var(--text-dim);font-style:italic;}
.how-to{background:var(--bg-mid);border:1px solid var(--border-light);border-radius:8px;padding:14px;text-align:left;}
.how-to h3{font-family:'Cinzel',serif;font-size:.9em;color:var(--gold-bright);margin-bottom:8px;}
.how-to p{font-size:.82em;color:var(--text-dim);margin-bottom:5px;line-height:1.55;}

/* ═══════════════════════════ SEASON CARD MODAL ═══════════════════════════ */
.sc-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);}
.sc-box{max-width:400px;width:95%;border-radius:14px;padding:26px 24px;text-align:center;border:3px solid;animation:cardReveal .4s ease;}
@keyframes cardReveal{0%{transform:scale(.7) rotateY(90deg);opacity:0;}65%{transform:scale(1.03) rotateY(-2deg);}100%{transform:scale(1) rotateY(0);opacity:1;}}
.sc-box.good{background:var(--green-bg);border-color:var(--green-bdr);box-shadow:0 0 30px rgba(60,200,40,.2);}
.sc-box.bad{background:var(--red-bg);border-color:var(--red-bdr);box-shadow:0 0 30px rgba(200,40,40,.2);}
.sc-s-lbl{font-size:.68em;letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;font-family:'Cinzel',serif;}
.sc-box.good .sc-s-lbl{color:var(--green);}
.sc-box.bad .sc-s-lbl{color:var(--red);}
.sc-icon{font-size:3em;margin-bottom:10px;}
.sc-name{font-family:'Cinzel',serif;font-size:1.3em;font-weight:700;margin-bottom:7px;letter-spacing:2px;}
.sc-box.good .sc-name{color:var(--green);}
.sc-box.bad .sc-name{color:var(--red);}
.sc-desc{font-size:.9em;color:var(--text-dim);margin-bottom:10px;line-height:1.55;}
.sc-effect{font-size:.9em;font-weight:700;margin-bottom:18px;padding:9px 13px;border-radius:7px;line-height:1.6;}
.sc-box.good .sc-effect{background:rgba(0,80,0,.1);color:var(--green);border:1px solid var(--green-bdr);}
.sc-box.bad .sc-effect{background:rgba(180,0,0,.08);color:var(--red);border:1px solid var(--red-bdr);}
.btn-dismiss{font-family:'Cinzel',serif;font-size:.9em;font-weight:700;border-radius:7px;padding:10px 22px;cursor:pointer;letter-spacing:1px;transition:all .2s;border:2px solid;width:100%;}
.sc-box.good .btn-dismiss{background:var(--green);border-color:var(--green);color:#fff;}
.sc-box.bad .btn-dismiss{background:var(--red);border-color:var(--red);color:#fff;}

/* ═══════════════════════════ MODALS ═══════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(3px);padding:20px;}
.modal{
  background:var(--bg-panel);border:2px solid var(--border);border-radius:12px;
  padding:18px 22px;max-width:900px;width:97%;
  max-height:calc(100vh - 40px);
  display:flex;flex-direction:column;
  box-shadow:var(--shadow-lg);overflow:hidden;
}
.modal-scroll{flex:1;overflow-y:auto;min-height:0;}
.modal-footer{flex-shrink:0;padding-top:12px;border-top:1px solid var(--border);margin-top:8px;}
.modal-title{font-family:'Cinzel',serif;font-size:1.15em;color:var(--gold-bright);text-align:center;letter-spacing:3px;margin-bottom:4px;flex-shrink:0;}
.modal-sub{font-size:.82em;color:var(--text-dim);text-align:center;margin-bottom:12px;font-style:italic;flex-shrink:0;}
.modal-wide{max-width:980px;}
.tier-label{font-size:.7em;letter-spacing:2px;text-transform:uppercase;font-family:'Cinzel',serif;margin:14px 0 7px;font-weight:700;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:4px;}
.forge-card{
  background:var(--bg-mid);border:2px solid var(--border);border-radius:9px;
  padding:10px 7px;text-align:center;cursor:not-allowed;opacity:.6;
  transition:all .2s;
}
.forge-card.can{cursor:pointer;opacity:1;}
.forge-card.can:hover{border-color:var(--gold-bright);background:var(--bg-deep);transform:translateY(-2px);}
.forge-card.special-die.can{border-color:var(--blue);background:rgba(0,60,120,.1);}
.c-sym{font-size:1.7em;margin-bottom:5px;}
.c-name{font-size:.7em;font-weight:700;color:var(--text);margin-bottom:5px;line-height:1.3;}
.cost-row{display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin-bottom:4px;}
.cc{font-size:.7em;padding:1px 5px;border-radius:3px;border:1px solid var(--border);}
.cc.ok{color:var(--green);border-color:var(--green-bdr);}
.cc.no{color:var(--red);border-color:var(--red-bdr);}
.afford{font-size:.65em;font-weight:700;}

/* Building modal — compact forge-style */
.bld-grid{display:flex;flex-wrap:wrap;align-items:flex-start;gap:4px;margin-bottom:4px;}
.bld-track-arrow{display:flex;align-items:center;font-size:1em;color:var(--border-light);padding:0 1px;align-self:center;}
.bld-card{
  background:var(--bg-mid);border:2px solid var(--border);border-radius:9px;
  padding:9px 9px 8px;min-width:130px;max-width:170px;flex:1;
  transition:all .2s;cursor:default;
}
.bld-card.built{border-color:var(--green-bdr);}
.bld-card.locked{opacity:.5;}
.bld-card.buyable{border-color:var(--gold-bright);cursor:pointer;background:rgba(180,130,0,.06);}
.bld-card.buyable:hover{background:rgba(180,130,0,.14);transform:translateY(-2px);}
.bld-card-top{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.bld-icon{font-size:1.3em;flex-shrink:0;}
.bld-name{font-family:'Cinzel',serif;font-size:.72em;font-weight:700;color:var(--text);line-height:1.2;}
.bld-pips{display:flex;gap:2px;margin-top:2px;}
.tier-pip{color:var(--border-light);font-size:.8em;}
.tier-pip.done{color:var(--green);}
.tier-pip.next{color:var(--gold-bright);}
.bld-locked{font-size:.62em;color:var(--red);background:var(--red-bg);border-radius:3px;padding:2px 5px;margin-bottom:4px;}
.bld-maxed{font-size:.62em;color:var(--green);background:var(--green-bg);border-radius:3px;padding:2px 5px;margin-bottom:4px;font-weight:700;}
.bld-current{font-size:.62em;color:var(--green);margin-bottom:4px;font-weight:600;line-height:1.3;}
.bld-next{border-top:1px solid var(--border);padding-top:5px;margin-top:2px;}
.bld-up-header{display:flex;align-items:center;gap:3px;margin-bottom:3px;flex-wrap:wrap;}
.bld-tier-num{font-size:.58em;background:var(--gold-bright);color:#1a0a00;border-radius:2px;padding:1px 4px;font-weight:700;}
.bld-tier-name{font-size:.68em;font-weight:700;color:var(--text);}
.bld-special{font-size:.6em;color:var(--purple);}
.bld-tier-prod{font-size:.65em;color:var(--green);font-weight:700;margin-bottom:2px;}
.bld-tier-glory{font-size:.65em;color:var(--purple);font-weight:700;margin-bottom:3px;display:inline;}
.bld-desc-line{font-size:.6em;color:var(--text-faint);line-height:1.35;margin-bottom:4px;font-style:italic;}
.bld-tier-effect{font-size:.6em;color:var(--text-dim);line-height:1.35;margin-bottom:3px;font-style:italic;}
.bld-cta{font-size:.62em;color:var(--gold-bright);font-weight:700;margin-top:4px;}
.bld-cant{font-size:.62em;color:var(--text-faint);margin-top:4px;}

/* Face picker in forge */
.die-group{margin-bottom:12px;}
.die-group-lbl{font-family:'Cinzel',serif;font-size:.72em;color:var(--gold-bright);margin-bottom:6px;letter-spacing:1px;}
.die-faces{display:flex;gap:6px;flex-wrap:wrap;}
.face-btn{
  width:60px;height:60px;background:var(--die-bg);border:2px solid var(--die-border);
  border-radius:8px;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-size:1.4em;
  transition:all .2s;gap:2px;
}
.face-btn:hover:not(.is-perm){border-color:var(--gold-bright);transform:scale(1.1);}
.face-btn.is-neg{border-color:var(--red-bdr);background:var(--red-bg);}
.face-btn.is-perm{border-color:var(--perm-bdr);background:var(--perm-bg);cursor:not-allowed;animation:permGlow 2s ease-in-out infinite;}
.face-btn span.tiny{font-size:.45em;color:var(--text-dim);text-align:center;line-height:1.2;max-width:52px;}

/* Remove perm modal */
.perm-face-btn{width:72px;height:72px;background:var(--perm-bg);border:2px solid var(--perm-bdr);border-radius:9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:1.4em;transition:all .2s;gap:3px;animation:permGlow 2s ease-in-out infinite;}
.perm-face-btn:hover{border-color:var(--perm-red);transform:scale(1.1);}
.perm-face-btn span.tiny{font-size:.5em;color:var(--perm-red);}

/* Visitor modal */
.btn-action{
  font-family:'Cinzel',serif;font-size:.82em;font-weight:700;
  padding:9px 18px;border-radius:7px;border:2px solid var(--gold-bright);
  cursor:pointer;transition:all .2s;background:var(--gold-bright);color:#1a0a00;
}
.btn-action:disabled{opacity:.4;cursor:not-allowed;}

/* Settings */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:flex-start;justify-content:flex-end;padding:56px 16px 16px;}
.settings-panel{background:var(--bg-panel);border:2px solid var(--border);border-radius:11px;padding:18px 20px;width:300px;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.sp-title{font-family:'Cinzel',serif;font-size:1em;color:var(--gold-bright);margin-bottom:12px;letter-spacing:2px;border-bottom:1px solid var(--border);padding-bottom:7px;}
.sp-section{margin-bottom:14px;}
.sp-lbl{font-size:.75em;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;font-weight:600;}
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.theme-btn{background:var(--bg-mid);border:2px solid var(--border);border-radius:7px;padding:8px 6px;cursor:pointer;text-align:center;transition:all .2s;font-family:'Cinzel',serif;font-size:.75em;color:var(--text);}
.theme-btn:hover{border-color:var(--gold-bright);}
.theme-btn.active{border-color:var(--gold-bright);background:var(--bg-deep);color:var(--gold-bright);font-weight:bold;}
.sp-slider-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.sp-slider-row label{font-size:.82em;color:var(--text);min-width:80px;}
.sp-slider-row input[type=range]{flex:1;accent-color:var(--gold-bright);}
.sp-slider-row span{font-size:.78em;color:var(--text-dim);min-width:32px;}
.sp-close{width:100%;font-family:'Cinzel',serif;font-size:.8em;background:var(--bg-deep);border:2px solid var(--border);color:var(--text);border-radius:6px;padding:8px;cursor:pointer;letter-spacing:1px;transition:all .2s;margin-top:5px;}
.sp-close:hover{border-color:var(--gold-bright);}

/* Game over */
.game-over{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:300;}
.game-over-box{text-align:center;background:var(--bg-panel);border-radius:13px;padding:36px 44px;max-width:480px;width:95%;box-shadow:var(--shadow-lg);}
.game-over-box.win{border:3px solid var(--gold-bright);}
.game-over-box.lose{border:3px solid var(--perm-red);}
.go-crown{font-size:3.5em;margin-bottom:8px;}
.go-result{font-family:'Cinzel',serif;font-size:1.6em;font-weight:900;letter-spacing:4px;margin-bottom:5px;}
.win .go-result{color:var(--gold-bright);}
.lose .go-result{color:var(--red);}
.go-sub{font-size:.88em;color:var(--text-dim);margin-bottom:12px;font-style:italic;}
.go-score{font-size:2.8em;font-weight:700;color:var(--purple);margin-bottom:3px;line-height:1;}
.go-rank{font-family:'Cinzel',serif;font-size:1.25em;color:var(--gold-bright);margin-bottom:4px;}
.go-detail{font-size:.9em;margin-bottom:18px;color:var(--text-dim);}
.btn-restart{font-family:'Cinzel',serif;font-size:.9em;font-weight:700;background:var(--gold-bright);border:2px solid var(--gold-bright);color:#1a0a00;border-radius:7px;padding:11px 26px;cursor:pointer;letter-spacing:2px;transition:all .2s;}
.btn-restart:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-close{font-family:'Cinzel',serif;font-size:.75em;background:var(--bg-mid);border:2px solid var(--border);color:var(--text-dim);border-radius:5px;padding:6px 16px;cursor:pointer;transition:all .2s;}
.btn-close:hover{border-color:var(--gold-bright);color:var(--gold-bright);}
.btn-back{font-family:'Cinzel',serif;font-size:.75em;background:var(--bg-mid);border:2px solid var(--border);color:var(--text);border-radius:5px;padding:6px 13px;cursor:pointer;margin-right:7px;}

/* Resource value flash on change */
@keyframes resFlash{0%{color:var(--gold-bright);transform:scale(1.25);}100%{color:inherit;transform:scale(1);}}
.res-val.flash{animation:resFlash .4s ease-out;}
/* Roll button idle pulse */
@keyframes rollPulse{0%,100%{box-shadow:0 0 0 0 rgba(245,200,66,.0);}50%{box-shadow:0 0 0 6px rgba(245,200,66,.18);}}
.btn-roll:not([disabled]){animation:rollPulse 2.5s ease-in-out infinite;}
/* Smooth modal entrance */
@keyframes modalIn{from{opacity:0;transform:translateY(-12px) scale(.97);}to{opacity:1;transform:none;}}
.modal{animation:modalIn .18s ease-out;}
.sc-box{animation:cardReveal .38s cubic-bezier(.22,.68,0,1.2);}
/* Log entry slide-in */
@keyframes logSlide{from{opacity:0;transform:translateX(10px);}to{opacity:1;transform:none;}}
.log-entry:first-child{animation:logSlide .25s ease-out;}
/* Dice rolled face glow pulse */
@keyframes rolledPulse{0%,100%{box-shadow:0 0 6px var(--gold-glow);}50%{box-shadow:0 0 14px var(--gold-glow);}}
.die-cube.is-rolled{animation:rolledPulse 1.4s ease-in-out infinite;}
.legend{display:none;}
.prod-panel{display:none;}
kbd{background:var(--bg-mid);border:1px solid var(--border-light);border-radius:3px;padding:1px 5px;font-size:.8em;font-family:monospace;color:var(--text-dim);letter-spacing:0;}
</style>

<script type="module">
// ═══════════════════════════
//  SETTINGS
// ═══════════════════════════
let S={theme:'tavern',fontSize:15,textColor:'',showSettings:false};
function applySettings(){
  // 'tavern' = default :root (dark), others get a class
  document.body.className=S.theme==='tavern'?'':'theme-'+S.theme;
  document.documentElement.style.setProperty('--font-size',S.fontSize+'px');
  // text colour override — empty string means use theme default
  if(S.textColor){
    document.documentElement.style.setProperty('--text',S.textColor);
    document.documentElement.style.setProperty('--text-dim',S.textColor);
  } else {
    document.documentElement.style.removeProperty('--text');
    document.documentElement.style.removeProperty('--text-dim');
  }
}
applySettings();

function getBuildingTier(id) { return G.buildings ? (G.buildings[id] || 0) : 0; }
function getBuildingData(id)  { return BUILDINGS.find(b => b.id === id); }
function isBuildingUnlocked(b) {
  if (!b.requires) return true;
  return getBuildingTier(b.requires) >= 1;
}
function getNextTier(b) {
  const cur = getBuildingTier(b.id);
  return cur < b.tiers.length ? b.tiers[cur] : null;
}
function hasAdvWorkshop(){return G&&getBuildingTier('workshop')>=4;}

// Compute production from all buildings
function calcProd() {
  const p = {grain:0, gold:0, glory:0, hammer:0};
  if (!G.buildings) return p;
  Object.entries(G.buildings).forEach(([id, tier]) => {
    if (tier <= 0) return;
    const b = getBuildingData(id);
    if (!b) return;
    // Sum production from all tiers up to current
    for (let t = 0; t < tier; t++) {
      // Only count production from the HIGHEST tier owned (not cumulative)
    }
    // Production from current tier only
    const tierData = b.tiers[tier-1];
    if (tierData?.prod) Object.entries(tierData.prod).forEach(([k,v]) => { p[k] = (p[k]||0) + v; });
  });
  return p;
}

function prodSrc(res) {
  if (!G.buildings) return '';
  const parts = [];
  Object.entries(G.buildings).forEach(([id, tier]) => {
    if (tier <= 0) return;
    const b = getBuildingData(id);
    const td = b?.tiers[tier-1];
    if (td?.prod?.[res]) parts.push(`${td.icon||b.icon}`);
  });
  return parts.join('');
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const canAfford=(r,c)=>Object.entries(c).every(([k,v])=>(r[k]||0)>=v);
const spend=(r,c)=>{const n={...r};Object.entries(c).forEach(([k,v])=>{n[k]=Math.max(0,(n[k]||0)-v);});return n;};
function addLog(msg,cls=''){G.log.unshift(cls?{msg,cls}:msg);if(G.log.length>35)G.log.pop();}
const lm=e=>typeof e==='string'?e:e.msg;
const lc=e=>typeof e==='string'?'':e.cls;
function isPerm(di,fi){return G.permanentCurses.some(p=>p.die===di&&p.face===fi);}

function applyProd(){
  const p=calcProd();const pts=[];
  if(p.grain >0){G.resources.grain =(G.resources.grain ||0)+p.grain; pts.push(`🌾+${p.grain}`);}
  if(p.gold  >0){G.resources.gold  =(G.resources.gold  ||0)+p.gold;  pts.push(`💰+${p.gold}`);}
  if(p.hammer>0){G.resources.hammer=(G.resources.hammer||0)+p.hammer;pts.push(`⚒️+${p.hammer}`);}
  if(p.glory >0){G.glory+=p.glory;                                    pts.push(`⚜️+${p.glory}`);}
  if(pts.length)addLog({msg:`📦 Production: ${pts.join(' ')}`,cls:'log-prod'});
}
function drawCard(){
  if(!G.deck.length){G.deck=shuffle([...G.discard]);G.discard=[];}
  const c=G.deck.pop();G.discard.push(c);return c;
}
function addPermCurse(di,fi){if(!isPerm(di,fi))G.permanentCurses.push({die:di,face:fi});}
function applyPermCurseAll(){
  G.dice.forEach((die,di)=>{
    const gi=die.findIndex((fid,fi)=>!F[fid].neg&&!isPerm(di,fi));
    if(gi>=0){die[gi]=CURSE_IDS[Math.floor(Math.random()*CURSE_IDS.length)];addPermCurse(di,gi);}
  });
}
function applyPermCurseOne(){
  const di=Math.floor(Math.random()*G.dice.length);
  const die=G.dice[di];
  const gi=die.findIndex((fid,fi)=>!F[fid].neg&&!isPerm(di,fi));
  if(gi>=0){die[gi]=CURSE_IDS[Math.floor(Math.random()*CURSE_IDS.length)];addPermCurse(di,gi);}
}
function isInfected(di,fi){return G.infections&&G.infections.some(x=>x.die===di&&x.face===fi);}
function addInfection(di,fi){
  if(!G.infections)G.infections=[];
  if(!isInfected(di,fi)&&!isPerm(di,fi)){
    G.dice[di][fi]='INFECTION';
    G.infections.push({die:di,face:fi});
    addLog({msg:`🦠 Die ${di+1} Face ${fi+1} is INFECTED — rolling it will spread the plague!`,cls:'log-cb'});
  }
}
function spreadInfection(){
  const candidates=[];
  G.dice.forEach((die,dj)=>{
    die.forEach((fid,fj)=>{
      if(!isInfected(dj,fj)&&!isPerm(dj,fj)&&!F[fid].neg)candidates.push({die:dj,face:fj});
    });
  });
  if(candidates.length){
    const pick=candidates[Math.floor(Math.random()*candidates.length)];
    addInfection(pick.die,pick.face);
    addLog({msg:`🦠 Infection spreads to Die ${pick.die+1}!`,cls:'log-cb'});
  }
}
function cureAllInfections(){
  if(!G.infections||!G.infections.length){addLog({msg:'🏥 Quarantine Edict: no infections found.',cls:'log-good'});return;}
  G.infections.forEach(inf=>{if(G.dice[inf.die]&&G.dice[inf.die][inf.face]==='INFECTION')G.dice[inf.die][inf.face]='GRAIN_1';});
  addLog({msg:`🏥 Quarantine Edict: ${G.infections.length} infection(s) cured!`,cls:'log-good'});
  G.infections=[];
}
function applyCardEffect(card){
  const e=card.e;const pts=[];
  if(e.grain)  {G.resources.grain =Math.max(0,(G.resources.grain ||0)+e.grain); pts.push(`🌾${e.grain>0?'+':''}${e.grain}`);}
  if(e.gold)   {G.resources.gold  =Math.max(0,(G.resources.gold  ||0)+e.gold);  pts.push(`💰${e.gold>0?'+':''}${e.gold}`);}
  if(e.hammer) {G.resources.hammer=Math.max(0,(G.resources.hammer||0)+e.hammer);pts.push(`⚒️+${e.hammer}`);}
  if(e.glory)  {G.glory=Math.max(0,G.glory+e.glory);                            pts.push(`⚜️${e.glory>0?'+':''}${e.glory}`);}
  if(e.extraForge){G.ad.frMax=2;G.ad.fr=2;pts.push('Forge ×2 this season');}
  if(e.freeForge) {G.ad.freeForge=true;pts.push('FREE forge this season');}
  if(e.skipForge) {G.ad.skipForge=true;pts.push('⚠️ Forge blocked');}
  if(e.extraRoll) {G.ad.extraRoll=true;pts.push('🍀 Extra roll granted!');}
  if(e.faceSwap)  {G.ad.faceSwap=true;G.modal='faceswap';pts.push('🃏 Choose faces to swap!');}
  if(e.freezeDice){G.ad.diceFrozen=true;G.phase='ACTION';pts.push('🫥 Dice frozen this season!');}
  if(e.loadedCurse){
    const candidates=G.dice.map((_,i)=>i).filter(i=>!G.loadedDice.includes(i));
    if(candidates.length){
      const di=candidates[Math.floor(Math.random()*candidates.length)];
      G.loadedDice.push(di);
      pts.push(`⚖️ Die ${di+1} is now LOADED!`);
      addLog({msg:`⚖️ Die ${di+1} is LOADED — negative faces weighted until forged away!`,cls:'log-perm'});
    }
  }
  if(e.addCurseFace){
    const di=Math.floor(Math.random()*G.dice.length);
    const die=G.dice[di];
    const gi=die.findIndex((fid,fi)=>!F[fid].neg&&!isPerm(di,fi)&&!isInfected(di,fi));
    if(gi>=0){
      const cid=CURSE_IDS[Math.floor(Math.random()*CURSE_IDS.length)];
      die[gi]=cid;
      pts.push(`👿 Die ${di+1} gained a ${F[cid].sym} curse face!`);
      addLog({msg:`👿 Demonic Infestation: Die ${di+1} sprouted a new ${F[cid].label} face!`,cls:'log-perm'});
    }
    checkAllCursedDie();
  }
  if(e.infect){
    const di=Math.floor(Math.random()*G.dice.length);
    const die=G.dice[di];
    const gi=die.findIndex((fid,fi)=>!F[fid].neg&&!isPerm(di,fi)&&!isInfected(di,fi));
    if(gi>=0){addInfection(di,gi);pts.push(`🦠 Die ${di+1} is INFECTED!`);}
    else pts.push('🦠 No face to infect — spared!');
  }
  if(e.visitor){
    G.pendingVisitor=LEGENDARY_VISITORS.find(v=>v.id===e.visitor);
    G.modal='visitor';
    pts.push(`${card.i} A visitor arrives with a legendary offer!`);
  }
  if(e.removePerm){
    if(G.permanentCurses.length>0){G.modal='removePerm';}
    else{pts.push('🕊️ No permanent curses to cleanse — but the relic blesses you regardless!');G.glory+=1;}
  }
  if(e.permCurse==='one'){applyPermCurseOne();pts.push('☠️ One PERMANENT curse added — seek Purification to remove it!');}
  const logCls=card.t==='good'?'log-cg':card.t==='visitor'?'log-cg':'log-cb';
  const logIcon=card.t==='good'?'✨':card.t==='visitor'?card.i:'☠️';
  addLog({msg:`${logIcon} ${card.name}: ${pts.join(' ')}`,cls:logCls});
}

  if(e.removePerm)  pts.push('🕊️ Cleanses ONE permanent curse from your dice');

function adjustBrightness(hex,factor){
  const r=parseInt(hex.slice(1,3),16),g2=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`#${Math.min(255,Math.round(r*factor)).toString(16).padStart(2,'0')}${Math.min(255,Math.round(g2*factor)).toString(16).padStart(2,'0')}${Math.min(255,Math.round(b*factor)).toString(16).padStart(2,'0')}`;
}
function lighten(hex,amt){
  const r=parseInt(hex.slice(1,3),16),g2=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`#${Math.min(255,Math.max(0,Math.round(r+amt*255))).toString(16).padStart(2,'0')}${Math.min(255,Math.max(0,Math.round(g2+amt*255))).toString(16).padStart(2,'0')}${Math.min(255,Math.max(0,Math.round(b+amt*255))).toString(16).padStart(2,'0')}`;
}
function lerp(a,b,t){return a+(b-a)*t;}

function drawTableSurface(ctx,W,H){
  const style=getComputedStyle(document.body);
  const tc=style.getPropertyValue('--canvas-table').trim()||'#c8a860';
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,adjustBrightness(tc,1.08));
  g.addColorStop(0.5,tc);
  g.addColorStop(1,adjustBrightness(tc,0.86));
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=0.06;ctx.strokeStyle='#000';ctx.lineWidth=1;
  for(let i=0;i<H;i+=9){
    ctx.beginPath();ctx.moveTo(0,i+Math.sin(i*0.38)*0.6);ctx.lineTo(W,i+0.8+Math.sin(i*0.38+1)*0.6);ctx.stroke();
  }
  ctx.globalAlpha=1;
  const vg=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.95);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.22)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
}

function drawDieOnCanvas(ctx,x,y,angle,sz,faceData,permFlag,negFlag,isLoaded,settled,isWinterDie){
  const hs=sz/2,r=sz*0.16;

  // ── Per-face colour identity ─────────────────────────────────────────────
  // Each face type gets a distinct dark body + bright accent so it reads
  // instantly even at small sizes on a dark background.
  function faceColors(fd,perm,neg,loaded,winter){
    if(winter)   return{bg:['#0d2a4a','#1a4070'],border:'#4080c0',label:'#80c0ff',shadow:'rgba(60,120,220,0.7)'};
    if(perm)     return{bg:['#3a0808','#200404'],border:'#cc2020',label:'#ff6060',shadow:'rgba(200,20,20,0.8)'};
    if(neg)      return{bg:['#2e0a0a','#1a0606'],border:'#b03030',label:'#ff8080',shadow:'rgba(180,30,30,0.7)'};
    if(loaded)   return{bg:['#2a1800','#1a0e00'],border:'#b06000',label:'#ffa040',shadow:'rgba(160,80,0,0.6)'};
    // Positive faces — colour by resource type
    if(fd.grain>0&&fd.gold===0&&fd.hammer===0&&fd.glory===0)
                 return{bg:['#1e2c00','#2e4400'],border:'#80b020',label:'#c8f040',shadow:'rgba(140,200,20,0.6)'};
    if(fd.gold>0&&fd.grain===0&&fd.hammer===0&&fd.glory===0)
                 return{bg:['#1a1a00','#2e2800'],border:'#b09000',label:'#ffd840',shadow:'rgba(220,180,0,0.65)'};
    if(fd.hammer>0&&fd.grain===0&&fd.gold===0&&fd.glory===0)
                 return{bg:['#0a1428','#101e38'],border:'#4070b0',label:'#80b8f0',shadow:'rgba(60,120,200,0.6)'};
    if(fd.glory>0&&fd.grain===0&&fd.gold===0&&fd.hammer===0)
                 return{bg:['#180a30','#240e48'],border:'#8040c0',label:'#c080ff',shadow:'rgba(160,60,220,0.65)'};
    if(fd.legendary)
                 return{bg:['#1a1400','#2e2400'],border:fd.legendaryGlow||'#f5c842',label:fd.legendaryGlow||'#f5c842',shadow:fd.legendaryGlow||'#f5c842'};
    // Mixed resource faces
                 return{bg:['#101820','#182430'],border:'#507090',label:'#90c0e0',shadow:'rgba(80,140,180,0.55)'};
  }

  const C=faceColors(faceData,permFlag,negFlag,isLoaded,isWinterDie);

  ctx.save();
  // drop shadow
  ctx.globalAlpha=0.28;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(x,y+hs*0.78,sz*0.44,sz*0.09,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  ctx.translate(x,y);ctx.rotate(angle);

  // body gradient
  ctx.beginPath();ctx.roundRect(-hs,-hs,sz,sz,r);
  const bg=ctx.createLinearGradient(-hs,-hs,hs,hs);
  bg.addColorStop(0,C.bg[0]);bg.addColorStop(1,C.bg[1]);
  ctx.fillStyle=bg;ctx.strokeStyle=C.border;ctx.lineWidth=sz*0.05;

  // settled glow
  if(settled){ctx.shadowColor=C.shadow;ctx.shadowBlur=18;}
  ctx.fill();ctx.stroke();ctx.shadowBlur=0;

  // perm double-ring overlay
  if(permFlag){ctx.strokeStyle='rgba(255,60,60,0.5)';ctx.lineWidth=sz*0.07;ctx.beginPath();ctx.roundRect(-hs,-hs,sz,sz,r);ctx.stroke();}

  // top-edge highlight (gives depth)
  const hi=ctx.createLinearGradient(0,-hs,0,-hs+sz*0.35);
  hi.addColorStop(0,'rgba(255,255,255,0.18)');hi.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hi;ctx.beginPath();ctx.roundRect(-hs,-hs,sz,sz*0.5,r);ctx.fill();

  // corner pips — subtle, matching border colour
  const po=sz*0.27,pr=sz*0.04;
  ctx.fillStyle=C.border+'66';
  [[-po,-po],[po,-po],[-po,po],[po,po]].forEach(([px,py])=>{ctx.beginPath();ctx.arc(px,py,pr,0,Math.PI*2);ctx.fill();});

  // emoji — rendered bright on dark background
  ctx.font=`${sz*0.44}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(255,255,255,0.95)';
  ctx.fillText(faceData.sym,0,sz*0.04);

  // label when settled — coloured to match face type
  if(settled){
    ctx.font=`bold ${sz*0.18}px sans-serif`;
    ctx.fillStyle=C.label;
    const lbl=faceData.label.length>10?faceData.label.slice(0,9)+'…':faceData.label;
    ctx.fillText(lbl,0,hs*0.66);
  }
  ctx.restore();
}

function spawnBurst(x,y,face){
  const labels=[];
  if(face.grain)labels.push({t:`🌾${face.grain>0?'+':''}${face.grain}`,c:face.grain>0?'#1a6010':'#b01818'});
  if(face.gold) labels.push({t:`💰${face.gold>0?'+':''}${face.gold}`,c:face.gold>0?'#8a5c10':'#b01818'});
  if(face.hammer)labels.push({t:`⚒️+${face.hammer}`,c:'#2848a0'});
  if(face.glory)labels.push({t:`⚜️${face.glory>0?'+':''}${face.glory}`,c:'#5020a0'});
  if(face.neg&&labels.length===0)labels.push({t:face.label,c:'#cc0000'});
  labels.forEach((l,j)=>{
    burstParticles.push({x,y:y-8,vx:(j-labels.length/2)*22+(Math.random()-0.5)*12,vy:-32-Math.random()*18,t:l.t,c:l.c,life:1});
  });
}

function updateBursts(ctx,dt){
  burstParticles=burstParticles.filter(p=>{
    p.life-=dt*1.3;if(p.life<=0)return false;
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=65*dt;
    ctx.save();
    ctx.globalAlpha=Math.min(1,p.life*2.2);
    ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=p.c;ctx.shadowColor=p.c;ctx.shadowBlur=7;
    ctx.fillText(p.t,p.x,p.y);
    ctx.restore();
    return true;
  });
}
